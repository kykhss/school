    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, collection, onSnapshot, deleteDoc, writeBatch, query, where, serverTimestamp,runTransaction, increment} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global variables provided by Canvas environment
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'school-management-app';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "YOUR_FIREBASE_API_KEY", // Placeholder if __firebase_config is not defined
            authDomain: "timetables-470dd.firebaseapp.com",
            projectId: "timetables-470dd",
            storageBucket: "timetables-470dd.appspot.com",
            messagingSenderId: "925422681424",
            appId: "1:925422681424:web:df91ce9de4dfef9c5ec055"
        };
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db, auth;
        let userId = null; // Will store the authenticated user's ID

        // Global data arrays (will be populated by attachDataListeners)
        let classes = [];
        let students = []; // Holds core student info
        let receipts = [];
        let feeStructures = []; // General fee rules
        let pendingPayments = []; // <-- NEW: For online payments


        //let studentFeeSetups = []; // Holds the *annual fee setup for each student*

        let activeListeners = {}; // To store unsubscribe functions for Firestore listeners
        let dataLoadStatus = {}; // To track if a collection has received its first snapshot
        let collectionLoadPromises = {}; // Stores Promises that resolve when a specific collection's initial load is complete

        // Demo data for school details (in a real app, this would be fetched from Firestore)
        let schoolDetails = {
            name: 'KATTILANGADI YATHEEMKHANA HIGHER SECONDARY SCHOOL',
            address: 'ATHAVANADU P.O, KATTILANGADI, KERALA - 671321',
            logoUrl: 'KYHSSLOGO.jpg', // Placeholder
            hmSignPng: 'https://placehold.co/100x50/aabbcc/ffffff?text=HM+Sign', // Placeholder
            schoolSealPng: 'SEAL.jpg' // Placeholder
        };

        // Available fee heads for dropdowns - IMPORTANT: 'CONCESSION' and 'MISC' must be last for logic
        let availableFeeHeads = ['admissionFee', 'arrears','tf1', 'tf2', 'tf3', 'vf1', 'vf2', 'vf3', 'concession', 'misc'];
        let currentUserRole =null;
        let selectedUser =null; // Stores the logged-in user's full data
        // Current financial year
        let activeFinancialYear = "2025-2026"; //`${new Date().getFullYear()}-${new Date().getFullYear() + 1}`;
        let feeStructureToEdit = null;
        let receiptToEdit = null;
        let currentStudentPendingFees = {}; // Stores pending fees for the currently selected student in receipt entry

        const mainContent = document.getElementById('main-content');
        const loginScreen = document.getElementById('login-screen');
        const globalLoadingOverlay = document.getElementById('global-loading-overlay');

        // --- Dexie (IndexedDB) Setup ---
        const appDb = new Dexie("Schoolrec");
appDb.version(1.5).stores({ // Incremented version
    classes: "id,name",
    students: "id,classId,division,gender,admissionNumber,name",
    receipts: "id,studentId,financialYear,date",
    feeStructures: "id,feeHead,classId,division,financialYear",
    pendingPayments: "transactionId,studentId,financialYear,submissionDate,status",
    // Table to store { collectionName: 'students', lastUpdated: Date }
    syncMeta: "collectionName" 
});

        // --- Firebase Utility Functions ---
        const getCollectionRef = (name) => collection(db, `/artifacts/${appId}/public/data/${name}`);
        const getDocRef = (name, id) => doc(db, `/artifacts/${appId}/public/data/${name}`, id);
        // Fee data is nested under feeData/{fy}/collectionName
        const getFeeCollectionRef = (fy, name) => collection(db, `/artifacts/${appId}/public/data/${name}${"_"}${fy}`);
        const getFeeDocRef = (fy, name, id) => doc(db, `/artifacts/${appId}/public/data/${name}${"_"}${fy}`, id);

        // --- Custom Alert Function (replaces alert/confirm) ---
        function showAlert(message, type = 'danger') {
            const alertEl = document.getElementById('custom-alert');
            const contentEl = document.getElementById('custom-alert-content');
            const messageEl = document.getElementById('custom-alert-message');
            const iconEl = document.getElementById('custom-alert-icon');
            messageEl.textContent = message;
            
            contentEl.className = 'alert d-flex align-items-center'; // Reset classes
            if (type === 'success') {
                contentEl.classList.add('alert-success');
                iconEl.className = 'fas fa-check-circle me-2';
            } else if (type === 'warning') {
                contentEl.classList.add('alert-warning');
                iconEl.className = 'fas fa-exclamation-triangle me-2';
            } else if (type === 'info') {
                contentEl.classList.add('alert-info');
                iconEl.className = 'fas fa-info-circle me-2';
            } else { 
                contentEl.classList.add('alert-danger');
                iconEl.className = 'fas fa-times-circle me-2';
            }
            alertEl.style.display = 'block';
            setTimeout(() => { alertEl.style.display = 'none'; }, 3000);
        }

        // --- Auto Logout Logic ---
        const IDLE_TIMEOUT = 15 * 60 * 1000; // 15 minutes in milliseconds
        let idleTimer;

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(autoLogout, IDLE_TIMEOUT);
        }

        function autoLogout() {
            if (userId) { // Only logout if a user is actually logged in
                showAlert("You have been logged out due to inactivity.", "info");
                handleLogout(); // Call the logout function
            }
        }

        // Attach event listeners to reset timer on user activity
        ['mousemove', 'mousedown', 'keypress', 'scroll', 'touchstart'].forEach(eventName => {
            document.addEventListener(eventName, resetIdleTimer, true);
        });

        // Start timer when logged in
        function startIdleTimer() {
            resetIdleTimer();
        }

        // Stop timer when logged out
        function stopIdleTimer() {
            clearTimeout(idleTimer);
        }


        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitButton = e.target.querySelector('button[type="submit"]');
            if (!submitButton) return;

            const originalButtonHtml = submitButton.innerHTML;
            submitButton.disabled = true;
            submitButton.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Signing In...`;

            try {
                const activeRole = document.querySelector('#loginTab .nav-link.active').getAttribute('data-bs-target').replace('#', '').replace('-login-view', '');

                if (!navigator.onLine) {
                    showAlert('You are offline. Please connect to the internet to log in.', 'danger');
                    return;
                }

                let userEmail, userPass;
                let userCollection = 'teachers'; // Assuming teachers collection holds both admin and accountant roles

                if (activeRole === 'admin') {
                    userEmail = document.getElementById('admin-user').value.toLowerCase();
                    userPass = document.getElementById('admin-pass').value;
                    if (!userEmail || !userPass) {
                        showAlert('Please enter admin email and password.', 'danger');
                        return;
                    }
                } else if (activeRole === 'teacher') { // Accountant role is labeled 'teacher' in HTML
                    userEmail = document.getElementById('teacher-useremail').value.toLowerCase();
                    userPass = document.getElementById('teacher-password').value;
                    if (!userEmail || !userPass) {
                        showAlert('Please enter email and password.', 'danger');
                        return;
                    }
                }

                const q = query(getCollectionRef(userCollection), where('email', '==', userEmail));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    showAlert('User not found in the database.', 'danger');
                } else {
                    const userDataDoc = querySnapshot.docs[0];
                    const userData = { id: userDataDoc.id, ...userDataDoc.data() };

                    // Basic password check (last 5 digits of mobile)
                    if (userPass === (userData.mobile || '').slice(-5)) {
                        // Role-specific check
                        if (activeRole === 'admin' && userData.role !== 'admin') {
                            showAlert('This user does not have admin privileges.', 'danger');
                        } else if (activeRole === 'teacher' && userData.role !== 'accountant') { // Changed 'teacher' to 'accountant'
                            showAlert('This user does not have accountant privileges.', 'danger');
                        } else {
                            // On successful role and password match, proceed with login
                            onLoginSuccess(userData.role, userData);
                        }
                    } else {
                        showAlert('Incorrect password.', 'danger');
                    }
                }
            } catch (error) {
                console.error("Login Error:", error);
                showAlert("Login failed. Please try again.", 'danger');
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = originalButtonHtml;
            }
        });

        document.getElementById('logout-btn').addEventListener('click', handleLogout); // Attach logout listener

        async function handleLogout() {
    stopIdleTimer(); // Stop the idle timer on logout
    unsubscribeAllListeners();
    
    // --- NEW: Clear IndexedDB (Dexie) Tables ---
    try {
        await Promise.all([
            appDb.classes.clear(),
            appDb.students.clear(),
            appDb.receipts.clear(),
            appDb.feeStructures.clear(),
            appDb.pendingPayments.clear(),
            appDb.syncMeta.clear()
        ]);
        console.log("Local database cleared successfully.");
    } catch (error) {
        console.error("Error clearing local database:", error);
    }
    // ------------------------------------------

    currentUserRole = null; 
    selectedUser = null;
    userId = null; // Clear userId on logout
    
    // Reset global arrays to ensure UI doesn't show old data if re-logged in
    classes = [];
    students = [];
    receipts = [];
    feeStructures = [];
    pendingPayments = [];

    mainContent.classList.remove('active'); // Hide main content
    loginScreen.classList.add('active'); // Show login screen
    showAlert("Logged out successfully. Local data cleared.", "info");
}

        function unsubscribeAllListeners() {
            for (const key in activeListeners) {
                if (typeof activeListeners[key] === 'function') {
                    activeListeners[key]();
                }
            }
            activeListeners = {};
            // Reset dataLoadStatus for a fresh start next login
            dataLoadStatus = {};
            collectionLoadPromises = {};
            classes = [];
            students = [];
            receipts = [];
            feeStructures = [];
          //  studentFeeSetups = [];
        }

        function showGlobalLoading(message = 'Loading data...') {
            globalLoadingOverlay.querySelector('p').textContent = message;
            globalLoadingOverlay.style.display = 'flex';
        }

        function hideGlobalLoading() {
            globalLoadingOverlay.style.display = 'none';
        }


        function waitForCollectionLoad(collectionName) {
            if (dataLoadStatus[collectionName]) {
                return Promise.resolve();
            }

            if (!collectionLoadPromises[collectionName]) {
                let resolveFunc;
                collectionLoadPromises[collectionName] = new Promise(resolve => {
                    resolveFunc = resolve;
                });
                collectionLoadPromises[collectionName].resolve = resolveFunc;
            }
            return collectionLoadPromises[collectionName];
        }

        async function onLoginSuccess(role, user) {
            currentUserRole = role;
            selectedUser = user;
            userId = user.id; // Store the authenticated user's ID

            loginScreen.classList.remove('active'); // Hide login screen
            mainContent.classList.add('active');   // Show main content

            // Update user display in navbar
            document.getElementById('user-display-name').textContent = selectedUser.name || selectedUser.email;
            document.getElementById('user-display-role').textContent = currentUserRole;

            startIdleTimer(); // Start the idle timer

            showGlobalLoading("Loading essential school data...");
            unsubscribeAllListeners(); // Clean up any previous session listeners

            let coreCollections = ['classes', 'students', 'receipts', 'feeStructures','pendingPayments']; // Added studentFeeSetups
            
            try {
                attachDataListeners(coreCollections);
                const coreCollectionPromises = coreCollections.map(name => waitForCollectionLoad(name));
                await Promise.all(coreCollectionPromises);
                showAlert(`Core data loaded.`, 'success');
                window.renderFeeManagement(); // Render the main UI
            } catch (error) {
                console.error("Initial data load failed:", error);
                showAlert("Failed to load essential school data. Please try again or refresh.", 'danger');
                handleLogout(); // Force logout on data load failure
            } finally {
                hideGlobalLoading();
            }
        }
        
        // --- Print Utility Function ---
        function printContentOfDiv(divId, title = 'Report', options = {}) {
            const {
                customHeaderHtml = '',
                customFooterHtml = '',
                extraCss = '',
                pageSize = 'A4 portrait',
                pageMargins = '0.8cm'
            } = options;

            if (!contentEl) {
                showAlert('Could not find content to print.', 'danger');
                return;
            }

            contentToPrint.querySelectorAll('.no-print').forEach(el => el.remove());

                showAlert('Please allow pop-ups for this website to print the report.', 'warning');
                return;
            }

            printWindow.document.write(`

                            hr { margin-top: 0.5rem; margin-bottom: 0.5rem; }
                            .mb-0 { margin-bottom: 0 !important; } .mt-0 { margin-top: 0 !important; }
                            table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 0.5rem; }
                            th, td { border: 1px solid #ccc; padding: 0.3rem 0.5rem; text-align: left; vertical-align: top; }

                            tbody tr:nth-child(even) { background-color: #f8f9fa; }
                            table, th, td { border-color: #dee2e6 !important; }
                            .report-header { text-align: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #eee; }
                            .report-header img { max-height: 60px !important; margin-bottom: 0.25rem !important; }
                            .report-header h4, .report-header h5 { margin-bottom: 0.2rem !important; }

        const updateGlobalDataAndCache = async (collectionName, data, snapshotTimestamp) => {
    // 1. Update Dexie Table (Upsert logic)
    try {
        const table = appDb.table(collectionName);
        if (data.length > 0) {
            await table.bulkPut(data); // Overwrites existing IDs, adds new ones
        }

        // 2. Update Sync Meta with the latest timestamp from the server
        if (snapshotTimestamp) {
            await appDb.syncMeta.put({ 
                collectionName: collectionName, 
                lastUpdated: snapshotTimestamp 
            });
        }

        // 3. Reload the global JS array from the now-merged Dexie table
        const allData = await table.toArray();
        switch (collectionName) {
            case 'classes': classes = allData; break;
            case 'students': students = allData; break;
            case 'receipts': receipts = allData; break;
            case 'feeStructures': feeStructures = allData; break;
            case 'pendingPayments': pendingPayments = allData; break;
        }
    } catch (e) {
        console.error(`Error updating cache for ${collectionName}:`, e);
    }
};

      async function attachDataListeners(collectionsToWatch) {
    if (!collectionsToWatch || collectionsToWatch.length === 0) return;

    for (const name of collectionsToWatch) {
        if (activeListeners[name]) continue;

        // 1. Load existing data from Dexie
        const table = appDb.table(name);
        const cachedData = await table.toArray();
        
        // Populate global variables
        if (name === 'classes') classes = cachedData;
        else if (name === 'students') students = cachedData;
        else if (name === 'receipts') receipts = cachedData;
        else if (name === 'feeStructures') feeStructures = cachedData;
        else if (name === 'pendingPayments') pendingPayments = cachedData;
        
        dataLoadStatus[name] = true;
        if (collectionLoadPromises[name]?.resolve) collectionLoadPromises[name].resolve();

        // 2. Determine Sync Metadata
        const meta = await appDb.syncMeta.get(name);
        const lastSyncTime = meta ? meta.lastUpdated : new Date(0);

        // 3. Dynamic Field Selection
        // Some collections use 'timestamp', others use 'lastUpdated'
        const syncField = (name === 'students' || name === 'classes') ? 'lastUpdated' : 'timestamp';

        let collectionRef;
        if (['receipts', 'feeStructures', 'pendingPayments'].includes(name)) {
            collectionRef = getFeeCollectionRef(activeFinancialYear, name);
        } else {
            collectionRef = getCollectionRef(name);
        }

        // 4. Create the Query using the detected field
        // Using >= ensures we don't miss records with the exact same millisecond
        const q = query(collectionRef, where(syncField, ">=", lastSyncTime));

        const unsub = onSnapshot(q, async (snapshot) => {
            if (snapshot.empty) return;

            let changes = [];
            let newestTs = lastSyncTime;

            snapshot.docChanges().forEach(change => {
                const docData = change.doc.data();
                const docId = change.doc.id;
                
                // Track the newest timestamp using the dynamic field name
                if (docData[syncField]) {
                    const jsDate = docData[syncField].toDate ? docData[syncField].toDate() : new Date(docData[syncField]);
                    if (jsDate > newestTs) newestTs = jsDate;
                }

                if (change.type === "removed") {
                    table.delete(docId);
                } else {
                    const item = { id: docId, ...docData };
                    if (name === 'pendingPayments') item.transactionId = docId;
                    changes.push(item);
                }
            });

            await updateGlobalDataAndCache(name, changes, newestTs);
            triggerUIRefresh(name);

        }, (error) => {
            console.error(`Sync error for ${name}:`, error);
        });

        activeListeners[name] = unsub;
    }
}

        /**
         * Calculates the pending fees for a given student and financial year.
         * This is a crucial function for both Fee Receipt and Reports.
         * @param {string} studentId
         * @param {string} financialYear
         * @returns {Object} An object with fee heads as keys and pending amounts as values.
         */
        async function getStudentPendingFees(studentId, financialYear) {
    // 1. Fetch Data
    const studentSetup = await getStudentFeeSetup(studentId, financialYear);
    const studentPayments = await getStudentReceiptsForFY(studentId, financialYear);

    // 2. Define the Mapping (Label to Key)
    const headMap = {
        'ARREARS': 'arrears',
        'ADMISSION FEE': 'admissionFee',
        'TUITION FEE (T1)': 'tf1',
        'VEHICLE FEE (T1)': 'vf1',
        'TUITION FEE (T2)': 'tf2',
        'VEHICLE FEE (T2)': 'vf2',
        'TUITION FEE (T3)': 'tf3',
        'VEHICLE FEE (T3)': 'vf3',
        'EXAM FEE': 'examFee',
        'MISC': 'misc'
    };

    // 3. Initialize Balances based on Student Setup
    let pendingFees = {};
    let totalInitialPayable = 0;

    // We iterate through our map to set up the initial "Due" amounts
    Object.keys(headMap).forEach(label => {
        const key = headMap[label];
        const dueAmount = (studentSetup && studentSetup[key]) ? parseFloat(studentSetup[key]) : 0;
        
        pendingFees[label] = dueAmount;
        
        // Add all heads except MISC to the initial payable sum
        if (key !== 'misc') {
            totalInitialPayable += dueAmount;
        }
    });

    // Handle Concession (Deduction)
    const concession = (studentSetup && studentSetup.concession) ? parseFloat(studentSetup.concession) : 0;
    const finalTotalPayable = totalInitialPayable - concession;

    // 4. Subtract Payments already made
    let netTotalPaid = 0;

    studentPayments.forEach(receipt => {
        if (receipt.isCancelled) return; // Skip cancelled receipts

        netTotalPaid += parseFloat(receipt.totalAmount || 0);

        receipt.items.forEach(item => {
            // Find the correct head in our pendingFees object
            // If it's a known head (like T1), subtract from that specific balance
            // If it's unknown, we treat it as 'MISC'
            const label = headMap[item.head] ? item.head : 'MISC';
            
            if (pendingFees[label] !== undefined) {
                pendingFees[label] -= parseFloat(item.amount || 0);
            }
        });
    });

    // 5. Final Result
    // Ensure no pending fee shows as negative (due to overpayment on a specific head)
    const itemizedPending = {};
    Object.keys(pendingFees).forEach(label => {
        itemizedPending[label] = Math.max(0, pendingFees[label]);
    });

    return {
        ...itemizedPending,
        concession: concession,
        totalPayable: finalTotalPayable,
        totalPaid: netTotalPaid,
        balanceDue: Math.max(0, finalTotalPayable - netTotalPaid)
    };
}

window.exportToCSV = () => {
    if (!window.currentExcelData) return;
    
    const rows = window.currentExcelData;
    const header = Object.keys(rows[0]).join(",");
    const csvContent = rows.map(row => 
        Object.values(row).map(v => `"${v}"`).join(",")
    ).join("\n");

    const blob = new Blob([header + "\n" + csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", `Receipts_Export_${new Date().toISOString().slice(0,10)}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

                             r.receiptNo.localeCompare(toRec, undefined, {numeric: true}) <= 0;
        return isMatchFY && isWithinRange && !r.isCancelled;

// 3. Process CSV into the table
async function processSFSCsv(csvText) {
    showGlobalLoading("Parsing CSV and matching students...");
    const lines = csvText.split(/\r?\n/);
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
    
    // Simple validation
    if (!headers.includes("admissionnumber")) {
        showAlert("Invalid CSV: 'AdmissionNumber' column missing", "danger");
        hideGlobalLoading();
        return;
    }

    const rows = lines.slice(1).filter(line => line.trim() !== "");
    const tableContainer = document.getElementById('sfs-table-container');
    const sfsStatus = document.getElementById('sfs-status');
    
    // We will simulate "Fetch Students" but populate with CSV data
    let tableHtml = `
        <table id="sfs-table" class="table table-bordered table-sm align-middle">
            <thead class="table-light">
                <tr style="font-size: 0.8rem">
                    <th>Student Info</th>
                    <th>Arrears</th><th>Adm.Fee</th><th>T1</th><th>T2</th><th>T3</th><th>V1</th><th>V2</th><th>V3</th><th>Exam</th><th>Concess</th>
                    <th>Total</th><th>Action</th>
                </tr>
            </thead>
            <tbody>
    `;

    let matchCount = 0;

    for (const line of rows) {
        const values = line.split(",").map(v => v.trim());
        const data = {};
        headers.forEach((header, i) => data[header] = values[i]);

        // Match student from our global student array
        const student = students.find(s => s.admissionNumber === data.admissionnumber);
        
        if (student) {
            matchCount++;
            const arrears = parseFloat(data.arrears) || 0;
            const adm = parseFloat(data.admissionfee) || 0;
            const tf1 = parseFloat(data.tf1) || 0, tf2 = parseFloat(data.tf2) || 0, tf3 = parseFloat(data.tf3) || 0;
            const vf1 = parseFloat(data.vf1) || 0, vf2 = parseFloat(data.vf2) || 0, vf3 = parseFloat(data.vf3) || 0;
            const exam = parseFloat(data.examfee) || 0;
            const conc = parseFloat(data.concession) || 0;

            const total = (arrears + adm + tf1 + tf2 + tf3 + vf1 + vf2 + vf3 + exam) - conc;

            tableHtml += `
                <tr data-student-id="${student.id}">
                    <td>
                        <div class="fw-bold small">${student.name}</div>
                        <div class="text-muted" style="font-size: 0.7rem">${student.admissionNumber} | ${student.division}</div>
                    </td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="arrears" value="${arrears}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="admissionFee" value="${adm}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="tf1" value="${tf1}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="tf2" value="${tf2}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="tf3" value="${tf3}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="vf1" value="${vf1}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="vf2" value="${vf2}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="vf3" value="${vf3}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input" data-fee="examFee" value="${exam}"></td>
                    <td><input type="number" class="form-control form-control-sm sfs-input text-danger fw-bold" data-fee="concession" value="${conc}"></td>
                    <td class="sfs-total-payable fw-bold">₹${total.toFixed(2)}</td>
                    <td><button class="btn btn-sm btn-link text-danger p-0 remove-row-btn"><i class="fas fa-trash"></i></button></td>
                </tr>
            `;
        }
    }

    tableHtml += `</tbody></table>`;
    tableContainer.innerHTML = tableHtml;
    sfsStatus.innerHTML = `<span class="badge bg-success">Successfully matched ${matchCount} students from CSV</span>`;
    document.getElementById('sfs-save-all-btn').style.display = 'block';
    document.getElementById('sfs-clear-btn').style.display = 'block';
    
    // Attach listener for dynamic totals
    attachFeeSetupTableListeners(activeFinancialYear);
    hideGlobalLoading();
}

function attachBulkReceiptListeners() {
    const uploadInput = document.getElementById('bulk-receipt-upload');

    uploadInput.addEventListener('change', (e) => {
        const file = e.target.files[0];

        const reader = new FileReader();
        reader.onload = (event) => {
            const lines = event.target.result.split(/\r?\n/);
            const headers = lines[0].split(",").map(h => h.trim());
            const rows = lines.slice(1).filter(l => l.trim() !== "").map(l => l.split(","));

            window.pendingBulkReceipts = { headers, rows };
            
            // Build Preview Table
            let html = `<table class="table table-sm table-hover mb-0"><thead class="table-light"><tr>`;
            headers.forEach(h => html += `<th class="small">${h}</th>`);
            html += `</tr></thead><tbody>`;
            rows.slice(0, 10).forEach(row => {
                html += `<tr>${row.map(cell => `<td class="small">${cell}</td>`).join('')}</tr>`;
            });
            html += `</tbody></table>`;

            document.getElementById('bulk-receipt-preview').innerHTML = html;
            document.getElementById('bulk-receipt-preview-container').classList.remove('d-none');
            document.getElementById('process-bulk-receipts-btn').classList.remove('d-none');
        };
        reader.readAsText(file);
    });

    // 3. The Actual Firestore Batch Upload
    document.getElementById('process-bulk-receipts-btn').addEventListener('click', async () => {
        if (!window.pendingBulkReceipts) return;
        const { headers, rows } = window.pendingBulkReceipts;
        
        showGlobalLoading(`Importing ${rows.length} receipts...`);
        const batch = writeBatch(db);
        let count = 0;

        try {
            // Get current max receipt number to avoid collisions
            const fyReceipts = receipts.filter(r => r.financialYear === activeFinancialYear);
            let maxNum = fyReceipts.reduce((max, r) => {
                const n = parseInt(r.receiptNo.split('-')[1]);
                return n > max ? n : max;
            }, 0);

            for (const rowValues of rows) {
                const rowData = {};
                headers.forEach((h, i) => rowData[h] = rowValues[i]);

                const student = students.find(s => s.admissionNumber === rowData.AdmissionNumber);
                if (!student) continue;

                maxNum++;
                if(maxnumber < 5000) {
                    showAlert("Receipt number limit exceeded for this financial year. Please check existing receipts.", "danger");
                    maxNum === 5001;
                }
                const newReceiptNo = `R${activeFinancialYear.slice(2,4)}${activeFinancialYear.slice(7,9)}-${maxNum.toString().padStart(4, '0')}`;

                // Map row data to the "items" array structure
                const items = [];
                const headsToImport = ["ARREARS", "ADMISSIONFEE", "TF1", "TF2", "TF3", "VF1", "VF2", "VF3", "EXAMFEE", "MISC"];
                headsToImport.forEach(h => {
                    const amt = parseFloat(rowData[h]) || 0;
                    if (amt > 0) items.push({ head: h, amount: amt });
                });

                const receiptData = {
                    receiptNo: newReceiptNo,
                    id: newReceiptNo,
                    date: rowData.Date || new Date().toISOString().slice(0,10),
                    studentId: student.id,
                    payerName: student.name,
                    isStudent: true,
                    items: items,
                    totalAmount: parseFloat(rowData.TotalAmount) || 0,
                    paymentMode: rowData.Mode || 'CASH',
                    financialYear: activeFinancialYear,
                    isCancelled: false,
                    recordedBy: selectedUser.name + " (Bulk)",
                    timestamp: serverTimestamp()
                };

                const docRef = getFeeDocRef(activeFinancialYear, 'receipts', newReceiptNo);
                batch.set(docRef, receiptData);
                count++;
            }

            await batch.commit();
            showAlert(`Successfully processed ${count} receipts!`, "success");
            renderFeeSubTab('receipt'); // Refresh list
        } catch (error) {
            console.error(error);
            showAlert("Error during bulk upload.", "danger");
        } finally {
            hideGlobalLoading();
        }
    });
}

                                batch.set(getFeeDocRef(activeFinancialYear, 'feeStructures', docId), structureData);

                             selectedDivisions.forEach(division => {

                                let structureData = { 
                                    id: docId,
                                    financialYear: activeFinancialYear, 
                                    feeHead, 
                                    appliesTo: 'CLASS', 
                                    classId, 
                                    division,
                                    auditedBy: selectedUser.name || userId, // Audit info
                                    timestamp: serverTimestamp() // Audit info
                                };

                                if (feeHead === 'TUITION FEE') {
                                    structureData = { ...structureData, term: 'TERM_BASED', 
                                                      term1_amount: parseFloat(fsTerm1Input.value) || 0, 
                                                      term2_amount: parseFloat(fsTerm2Input.value) || 0, 
                                                      term3_amount: parseFloat(fsTerm3Input.value) || 0 };
                                } else { // EXAM FEE or ADMISSION FEE
                                    structureData = { ...structureData, term: 'ANNUAL', 
                                                      amount: parseFloat(fsAmountInput.value) || 0 };
                                }
                                batch.set(getFeeDocRef(activeFinancialYear, 'feeStructures', docId), structureData);
                            });

                        if (!stage) { showAlert('Please enter a vehicle stage.', 'danger'); return; }

                        const docId = `VEHICLE_FEE_${stage.replace(/\s+/g, '_')}`;

                        let structureData = { 
                            id:docId,
                            financialYear: activeFinancialYear, 
                            feeHead, 
                            appliesTo: 'VEHICLE', 
                            stage, 
                            term: 'TERM_BASED', 
                            term1_amount: parseFloat(fsTerm1Input.value) || 0, 
                            term2_amount: parseFloat(fsTerm2Input.value) || 0, 
                            term3_amount: parseFloat(fsTerm3Input.value) || 0,
                            auditedBy: selectedUser.name || userId, // Audit info
                            timestamp: serverTimestamp() // Audit info
                        };
                        batch.set(getFeeDocRef(activeFinancialYear, 'feeStructures', docId), structureData);
                    }

                    await batch.commit();
                    showAlert('Fee structure saved successfully!', 'success');
                    
                    feeStructureToEdit = null;
                    form.reset();
                    form.classList.remove('was-validated');
                    dynamicContainer.innerHTML = '';
                    headSelect.disabled = false;
                    headSelect.value = '';
                    
                } catch (error) {
                    console.error("Error saving fee structure:", error);
                    showAlert('Failed to save fee structure. Please try again.', 'danger');
                } finally {
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonHtml;

        function renderFeeStructuresList() {
            const container = document.getElementById('fee-structures-list');
            if (!container) return;
            
            const sortedFeeStructures = [...feeStructures].sort((a,b) => {
                const headA = a.feeHead || '';
                const headB = b.feeHead || '';
                const classA = classes.find(c => c.id === a.classId)?.name || '';
                const classB = classes.find(c => c.id === b.classId)?.name || '';
                
                if (headA !== headB) return headA.localeCompare(headB);
                if (classA !== classB) return classA.localeCompare(classB);
                if (a.division && b.division) return a.division.localeCompare(b.division);
                if (a.stage && b.stage) return a.stage.localeCompare(b.stage);
                return 0;
            });

            if (sortedFeeStructures.length === 0) {
                container.innerHTML = `<p class="text-muted text-center p-5">No fee structures defined for ${activeFinancialYear}.</p>`;
                return;
            }

            container.innerHTML = `<h5 class="mb-3">Existing Structures for ${activeFinancialYear}</h5>
                <ul class="list-group">
                    ${sortedFeeStructures.map(s => {
                        let details = '';
                        let amountsHtml = '';

                        if (s.appliesTo === 'CLASS') {
                            details = `Class: ${classes.find(c => c.id === s.classId)?.name || 'N/A'} - Div: ${s.division || 'N/A'}`;
                        } else if (s.appliesTo === 'VEHICLE') {
                            details = `Stage: ${s.stage}`;

                        if (s.term === 'TERM_BASED') {

                                    Term 3: ₹${(s.term3_amount || 0).toFixed(2)}

                            amountsHtml = `<p class="mb-0 text-sm text-muted">Annual Amount: ₹${(s.amount || 0).toFixed(2)}</p>`;

        window.handleEditFeeStructure = (id) => {
            const selectedFeeStructure = feeStructures.find(fs => fs.id === id);
            if (selectedFeeStructure) {
                // When editing a class-based fee, we want to select all divisions it applies to.
                // The current ID might be specific to one class/division combination.
                // We need to group by feeHead and classId to get all relevant divisions.
                let structuresToGroup = [];
                if (selectedFeeStructure.appliesTo === 'CLASS') {
                    structuresToGroup = feeStructures.filter(s =>
                        s.financialYear === selectedFeeStructure.financialYear &&
                        s.feeHead === selectedFeeStructure.feeHead &&
                        s.classId === selectedFeeStructure.classId
                    );
                } else {
                    structuresToGroup = [selectedFeeStructure]; // For vehicle or other single entries
                }
                
                feeStructureToEdit = {
                    ...selectedFeeStructure,
                    // Collect all divisions associated with this fee head and class
                    divisions: structuresToGroup.filter(s => s.division).map(s => s.division) 
                };

                renderFeeStructureTab();
            } else {
                showAlert('Fee structure not found for editing.', 'danger');
                console.warn('Fee structure not found for editing:', id);
            }
        };

        window.handleDeleteFeeStructure = async (id) => {
            const confirmDelete = await new Promise(resolve => {
                const modalHtml = `
                    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmModalLabel" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="deleteConfirmModalLabel">Confirm Deletion</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    Are you sure you want to delete this fee structure? This action cannot be undone.
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Yes, Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                const confirmModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
                confirmModal.show();

                document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
                    confirmModal.hide();
                    resolve(true);
                });
                document.getElementById('deleteConfirmModal').addEventListener('hidden.bs.modal', () => {
                    document.getElementById('deleteConfirmModal').remove();
                    resolve(false);
                });
            });

            if (!confirmDelete) {
                return;
            }

            try {
                // For class-based fees, if deleting one ID, we might need to delete all related for that class+feeHead
                const structureToDelete = feeStructures.find(fs => fs.id === id);
                if (!structureToDelete) {
                    showAlert('Fee structure not found for deletion.', 'danger');
                    return;
                }

                const batch = writeBatch(db);
                if (structureToDelete.appliesTo === 'CLASS') {
                    const relatedStructures = feeStructures.filter(s => 
                        s.financialYear === structureToDelete.financialYear &&
                        s.feeHead === structureToDelete.feeHead &&
                        s.classId === structureToDelete.classId
                    );
                    relatedStructures.forEach(s => {
                        batch.delete(getFeeDocRef(activeFinancialYear, 'feeStructures', s.id));
                    });
                } else {
                    batch.delete(getFeeDocRef(activeFinancialYear, 'feeStructures', id));
                }
                
                await batch.commit();
                showAlert('Fee structure(s) deleted successfully.', 'success');
            } catch (error) {
                console.error('Error deleting fee structure:', error);
                showAlert('Failed to delete fee structure. Please try again.', 'danger');
            }
        };

        async function attachStudentFeeSetupListeners() {
    const sfsClassSelect = document.getElementById('sfs-class');
    const sfsDivisionSelect = document.getElementById('sfs-division');
    const sfsFetchBtn = document.getElementById('sfs-fetch-btn');
    const sfsStatusDiv = document.getElementById('sfs-status');
    const sfsTableContainer = document.getElementById('sfs-table-container');
    const sfsSaveAllBtn = document.getElementById('sfs-save-all-btn');

    sfsClassSelect.addEventListener('change', () => {
        const selectedClassId = sfsClassSelect.value;
        sfsDivisionSelect.innerHTML = '<option value="">-- Select Division --</option>';
        sfsDivisionSelect.disabled = true;
        if (selectedClassId) {
            const selectedClass = classes.find(c => c.id === selectedClassId);
            if (selectedClass && selectedClass.divisions) {
                sfsDivisionSelect.disabled = false;
                selectedClass.divisions.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d;
                    option.textContent = d;
                    sfsDivisionSelect.appendChild(option);
                });
            }
        }
    });

    sfsFetchBtn.addEventListener('click', async () => {
        const classId = sfsClassSelect.value;
        const division = sfsDivisionSelect.value;

        if (!classId) {
            showAlert('Please select a Class to fetch students.', 'warning');
            return;
        }

        sfsStatusDiv.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"><span class="visually-hidden">Loading...</span></div> Fetching students...';
        sfsTableContainer.innerHTML = '';
        sfsSaveAllBtn.style.display = 'none';

        try {
            let filteredStudents = students.filter(s => s.classId === classId);
            if (division) {
                filteredStudents = filteredStudents.filter(s => s.division === division);
            }

            if (filteredStudents.length === 0) {
                sfsStatusDiv.textContent = 'No students found for the selected criteria.';
                return;
            }

            sfsStatusDiv.textContent = `Found ${filteredStudents.length} students. Generating fee setup table...`;

            // --- OPTIMIZATION START ---
            // Create an array of promises, one for each student's fee setup
            const studentSetupPromises = filteredStudents.map(async student => {
                const existingFeeSetup = await getStudentFeeSetup(student.id, activeFinancialYear); // Still awaits inside this map callback, but map returns promises
                return { student, existingFeeSetup }; // Return both student and their setup
            });

            // Wait for all promises to resolve in parallel
            const studentsWithSetups = await Promise.all(studentSetupPromises);
            // --- OPTIMIZATION END ---


            let tableHtml = `
                <table id="sfs-table" class="table table-bordered table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Admission No.</th>
                            <th>Class - Div</th>
                            <th>Arrears</th>
                            <th>Admission Fee</th>
                            <th>tutionT1</th><th>tutionT2</th><th>tutionT3</th>
                            <th>vehicleV1</th><th>vehicleV2</th><th>vehicleV3</th>
                            <th>ExamFee</th>
                            <th>Concession</th>
                            <th>Total Payable</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // Loop through the results (which now include both student and their setup)
            for (const { student, existingFeeSetup } of studentsWithSetups) {
                // Auto-fill from general fee structure rules
                let autoFilledFees = {
                    arrears: existingFeeSetup?.arrears || 0,
                    admissionFee: existingFeeSetup?.admissionFee || 0,
                    tf1: existingFeeSetup?.tf1 || 0, tf2: existingFeeSetup?.tf2 || 0, tf3: existingFeeSetup?.tf3 || 0,
                    vf1: existingFeeSetup?.vf1 || 0, vf2: existingFeeSetup?.vf2 || 0, vf3: existingFeeSetup?.vf3 || 0,
                    examFee: existingFeeSetup?.examFee || 0,
                    concession: existingFeeSetup?.concession || 0,
                };

                // Apply general fee structure rules if no existing setup, or if values are zero
                const relevantRules = feeStructures.filter(rule => 
                    (rule.appliesTo === 'CLASS' && rule.classId === student.classId && rule.division === student.division) ||
                    (rule.appliesTo === 'VEHICLE' && rule.stage === student.vehicleStage)
                );
                
                relevantRules.forEach(rule => {
                    if (rule.feeHead === 'TUITION FEE' && autoFilledFees.tf1 === 0 && autoFilledFees.tf2 === 0 && autoFilledFees.tf3 === 0) {
                        autoFilledFees.tf1 = rule.term1_amount || 0;
                        autoFilledFees.tf2 = rule.term2_amount || 0;
                        autoFilledFees.tf3 = rule.term3_amount || 0;

        async function saveAllFeeSetups(fy) {
    const saveButton = document.getElementById('sfs-save-all-btn');
    const originalButtonHtml = saveButton.innerHTML;
    saveButton.disabled = true;
    saveButton.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving All...`;

    const batch = writeBatch(db);
    const studentRows = document.querySelectorAll('#sfs-table tbody tr');

    if (studentRows.length === 0) {
        showAlert('No students to save.', 'warning');
        saveButton.disabled = false;
        saveButton.innerHTML = originalButtonHtml;
        return;
    }

    let successCount = 0;
    let errorCount = 0;

    for (const row of studentRows) {
        const studentId = row.dataset.studentId;
        // CHANGE START: Reference the student document directly
        const studentDocRef = doc(db, `/artifacts/${appId}/public/data/students`, studentId); 
        // CHANGE END

        const feeData = {
            // studentId and financialYear are no longer properties *of* the feeData object
            // because they are implied by the document ID (studentId) and the nested key (financialYear).
            auditedBy: selectedUser.name || userId, // Audit info
            timestamp: serverTimestamp() // Audit info
        };
        let totalPayable = 0;
        const inputs = row.querySelectorAll('.sfs-input');

        inputs.forEach(input => {
            const feeType = input.dataset.fee;
            const amount = parseFloat(input.value) || 0;
            feeData[feeType] = amount;
            if (feeType !== 'concession') {
                totalPayable += amount;
            }
        });
        feeData.totalPayable = totalPayable - (feeData.concession || 0);

        try {
            // CHANGE START: Use set with merge on the nested feeDetails field
            batch.set(studentDocRef, {
                feeDetails: {
                    [fy]: feeData // Dynamically set the financial year as a key within feeDetails
                }
            }, { merge: true }); // Crucial: use merge to only update feeDetails and not overwrite other student data
            // CHANGE END

            successCount++;
            // Reset UI for the row after successful batching
            row.querySelectorAll('.sfs-input').forEach(input => input.disabled = true);
            row.querySelector('.sfs-edit-btn').classList.remove('d-none');
            row.querySelector('.sfs-save-btn').classList.add('d-none');
            row.querySelector('.sfs-cancel-btn').classList.add('d-none');
        } catch (batchError) {
            console.error(`Error batching update for ${studentId}:`, batchError);
            errorCount++;
        }
    }

    try {
        await batch.commit();
        showAlert(`Fee setup saved for ${successCount} students. ${errorCount} errors.`, 'success');
    } catch (error) {
        console.error("Error committing batch saving fee setups: ", error);
        showAlert("An error occurred during bulk save. Please check the console.", 'danger');
    } finally {
        saveButton.disabled = false;
        saveButton.innerHTML = originalButtonHtml;
    }
}

        async function saveIndividualStudentFeeSetup(studentId, fy, rowElement) {
            const saveButton = rowElement.querySelector('.sfs-save-btn');
            const originalButtonHtml = saveButton.innerHTML;
            saveButton.disabled = true;
            saveButton.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving...`;

            try {
                const studentRef = getDocRef('students', studentId); // Now points to the student document


                const feeDataForYear = { 
                    studentId, // Ensure studentId is part of the doc for query purposes
                    financialYear: fy,
                    auditedBy: selectedUser.name || userId, // Audit info
                    timestamp: serverTimestamp() // Audit info
                };
                let totalPayable = 0;
                const inputs = rowElement.querySelectorAll('.sfs-input');

                inputs.forEach(input => {
                    const feeType = input.dataset.fee;
                    const amount = parseFloat(input.value) || 0;
                    feeDataForYear[feeType] = amount;
                    if (feeType !== 'concession') {
                        totalPayable += amount;
                    }
                });
                feeDataForYear.totalPayable = totalPayable - (feeDataForYear.concession || 0);
                
                await updateDoc(studentRef, { [`feeDetails.${fy}`]: feeDataForYear }); 

                showAlert(`Fee setup for ${students.find(s => s.id === studentId)?.name || studentId} saved successfully!`, 'success');

                rowElement.querySelectorAll('.sfs-input').forEach(input => input.disabled = true);
                rowElement.querySelector('.sfs-edit-btn').classList.remove('d-none');
                rowElement.querySelector('.sfs-save-btn').classList.add('d-none');
                rowElement.querySelector('.sfs-cancel-btn').classList.add('d-none');

            } catch (error) {
                console.error("Error saving individual student fee setup: ", error);
                showAlert('Failed to save fee setup. Please try again.', 'danger');
            } finally {
                saveButton.disabled = false;
                saveButton.innerHTML = originalButtonHtml;
            }
        }

        function attachFeeSetupTableListeners(fy) {
            const tableBody = document.querySelector('#sfs-table tbody');
            if (!tableBody) return;

            tableBody.addEventListener('click', async (e) => {
                const target = e.target;
                const row = target.closest('tr');

                if (!row) return;

                const studentId = row.dataset.studentId;
                const inputs = row.querySelectorAll('.sfs-input');
                const editBtn = row.querySelector('.sfs-edit-btn');
                const saveBtn = row.querySelector('.sfs-save-btn');
                const cancelBtn = row.querySelector('.sfs-cancel-btn');

                if (target.classList.contains('sfs-edit-btn')) {
                    const originalValues = {};
                    inputs.forEach(input => {
                        input.disabled = false;
                        originalValues[input.dataset.fee] = input.value;
                    });
                    row.dataset.originalValues = JSON.stringify(originalValues);

                    editBtn.classList.add('d-none');
                    saveBtn.classList.remove('d-none');
                    cancelBtn.classList.remove('d-none');

                } else if (target.classList.contains('sfs-save-btn')) {
                    await saveIndividualStudentFeeSetup(studentId, fy, row);
                    
                } else if (target.classList.contains('sfs-cancel-btn')) {
                    const originalValues = JSON.parse(row.dataset.originalValues || '{}');
                    inputs.forEach(input => {
                        input.value = originalValues[input.dataset.fee] || '';
                        input.disabled = true;
                    });

                    editBtn.classList.remove('d-none');
                    saveBtn.classList.add('d-none');
                    cancelBtn.classList.add('d-none');
                    row.removeAttribute('data-original-values');
                    // Recalculate total payable to revert
                    let rowTotal = 0;
                    let rowConcession = 0;
                    inputs.forEach(input => {
                        const amount = parseFloat(input.value) || 0;
                        if (input.dataset.fee === 'concession') {
                            rowConcession = amount;
                        } else {
                            rowTotal += amount;
                        }
                    });
                    row.querySelector('.sfs-total-payable').textContent = `₹ ${(rowTotal - rowConcession).toFixed(2)}`;
                }
            });

            document.getElementById('sfs-table').addEventListener('input', (e) => {
                if (e.target.classList.contains('sfs-input')) {
                    const row = e.target.closest('tr');
                    const inputs = row.querySelectorAll('.sfs-input');
                    let rowTotal = 0;
                    let rowConcession = 0;
                    inputs.forEach(input => {
                        const amount = parseFloat(input.value) || 0;
                        if (input.dataset.fee === 'concession') {
                            rowConcession = amount;
                        } else {
                            rowTotal += amount;
                        }
                    });
                    row.querySelector('.sfs-total-payable').textContent = `₹ ${(rowTotal - rowConcession).toFixed(2)}`;
                }
            });
        }

                const v = parseFloat(i.value) || 0;
                if (v > 0) items.push({ head: i.dataset.head, amount: v });
            });

            await runTransaction(db, async (txn) => {
                const cRef = doc(db, `/artifacts/${appId}/public/data/counters_${currentFY}`, 'receipt_sequence');
                const snap = await txn.get(cRef);
                const next = (snap.exists() ? snap.data().lastValue : 4985) + 1;

                    financialYear: currentFY, isCancelled: false, recordedBy: selectedUser.name || 'Staff', timestamp: serverTimestamp()
                };

                txn.set(getFeeDocRef(currentFY, 'receipts', rNo), data);

            });

        function convertNumberToWords(num) {
            const units = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
            const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
            const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
            // Indian numbering system scales
            const scales = [
                { value: 10000000, label: 'crore' },
                { value: 100000, label: 'lakh' },
                { value: 1000, label: 'thousand' },
                { value: 100, label: 'hundred' }
            ];

            function getTwoDigitWords(n) {
                if (n < 10) return units[n];
                else if (n < 20) return teens[n - 10];
                else return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? ' ' + units[n % 10] : '');
            }

            function toIndianWords(n) {
                if (n === 0) return 'zero';

                let result = '';
                let remaining = n;

                for (const scale of scales) {
                    if (remaining >= scale.value) {
                        const count = Math.floor(remaining / scale.value);
                        result += getTwoDigitWords(count) + ' ' + scale.label + ' ';
                        remaining %= scale.value;
                    }
                }

                if (remaining > 0) {
                    if (result !== '' && remaining < 100) result += 'and '; // "one hundred AND five"
                    result += getTwoDigitWords(remaining);
                }

                return result.trim();
            }

            const numStr = parseFloat(num).toFixed(2);
            const [integerPart, decimalPart] = numStr.split('.');
            let words = toIndianWords(parseInt(integerPart, 10));

            if (parseInt(decimalPart, 10) > 0) {
                words += ` and ${getTwoDigitWords(parseInt(decimalPart, 10))} paisa`;
            }

            return words.charAt(0).toUpperCase() + words.slice(1);
        }

        async function generateAndDisplayFeeReport(classId, division, term, containerId) {
            const reportContainer = document.getElementById(containerId);
            if (!reportContainer) return;

            reportContainer.innerHTML = `<div class="text-center text-muted py-4"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">Generating report...</p></div>`;

            const studentsInClass = students.filter(s => s.classId === classId && s.division === division);
            if (studentsInClass.length === 0) {
                reportContainer.innerHTML = '<div class="alert alert-warning">No students found for this selection.</div>';
                return;
            }
            
            if (!activeFinancialYear) {
                reportContainer.innerHTML = '<div class="alert alert-danger">Error: Active Financial Year is not defined.</div>';
                return;
            }

            const reportDataPromises = studentsInClass.map(async student => {
                const feeCalculations = await getStudentPendingFees(student.id, activeFinancialYear); //

                let termPayableForReport = 0; // This will hold the payable amount specific to the selected 'term'
                const studentSetup = await getStudentFeeSetup(student.id, activeFinancialYear);

                if (studentSetup) {
                    termPayableForReport += (studentSetup.arrears || 0);
                    termPayableForReport += (studentSetup.admissionFee || 0);

                    if (term === 'T1' || term === 'T2' || term === 'T3' || term === 'FY') {
                        termPayableForReport += (studentSetup.tf1 || 0);
                        termPayableForReport += (studentSetup.vf1 || 0);
                        termPayableForReport += (studentSetup.examFee || 0); // Assuming Exam fee is once, usually by T1
                    }
                    if (term === 'T2' || term === 'T3' || term === 'FY') {
                        termPayableForReport += (studentSetup.tf2 || 0);
                        termPayableForReport += (studentSetup.vf2 || 0);
                    }
                    if (term === 'T3' || term === 'FY') {
                        termPayableForReport += (studentSetup.tf3 || 0);
                        termPayableForReport += (studentSetup.vf3 || 0);
                    }
                    
                    // Concession reduces the overall payable, apply it to the final calculated termPayableForReport
                    termPayableForReport -= (studentSetup.concession || 0);
                }

                // Balance due is calculated against the total payments made vs. what was due up to the selected term
                const paymentsForReport = receipts.filter(r => r.studentId === student.id && !r.isCancelled && r.financialYear === activeFinancialYear)
                    .reduce((sum, r) => sum + r.totalAmount, 0);

                const balance = termPayableForReport - paymentsForReport;

                return {
                    ...student,
                    totalPayable: termPayableForReport, // Total due for the selected term/FY
                    totalPaid: paymentsForReport,       // Total paid for the current FY
                    balance: balance,                   // Balance for the selected term/FY
                };
            });

            const reportData = await Promise.all(reportDataPromises);

            displayFeeReport(reportData, containerId);
        }

                data-whatsapp="${student.whatsappNo}"
                data-payable="${student.totalPayable.toFixed(2)}"
                data-paid="${student.totalPaid.toFixed(2)}"> 
                <i class="fab fa-whatsapp"></i> Send Reminder
            </button>` : '';
                return `

                        <td><a href="#" class="fw-bold student-details-link" data-studentid="${student.id}">${student.name}</a></td>
                        <td>${student.admissionNumber}</td>

        async function calculateTrueHistoricalArrears(studentId, targetFinancialYear) {
    const student = students.find(s => s.id === studentId); // Get student from global array
    if (!student) {
        console.warn(`Student with ID ${studentId} not found for arrears calculation.`);
        return 0;
    }

    let totalFeesDueFromPriorYears = 0;
    let totalPaymentsMadeTowardsPriorYears = 0;

    // CHANGE START: Get all financial years for which feeDetails exist for this student
    const allSetupYears = student.feeDetails ? Object.keys(student.feeDetails).sort() : [];
    // CHANGE END

    for (const fy of allSetupYears) {
        // Only consider financial years *before* the targetFinancialYear
        if (fy >= targetFinancialYear) {
            break;
        }

        // CHANGE START: Access fee setup directly from student.feeDetails
        const feeSetupForYear = student.feeDetails[fy];
        // CHANGE END
        if (feeSetupForYear) {
            // Sum up all original payable amounts for this prior year
            totalFeesDueFromPriorYears += (feeSetupForYear.arrears || 0);
            totalFeesDueFromPriorYears += (feeSetupForYear.admissionFee || 0);
            totalFeesDueFromPriorYears += (feeSetupForYear.tf1 || 0) + (feeSetupForYear.tf2 || 0) + (feeSetupForYear.tf3 || 0);
            totalFeesDueFromPriorYears += (feeSetupForYear.vf1 || 0) + (feeSetupForYear.vf2 || 0) + (feeSetupForYear.vf3 || 0);
            totalFeesDueFromPriorYears += (feeSetupForYear.examFee || 0);
            totalFeesDueFromPriorYears -= (feeSetupForYear.concession || 0);
        }
    }

    // Sum up all payments made by this student for prior years
    const paymentsForPriorYears = receipts.filter(r =>
        r.studentId === studentId &&
        !r.isCancelled &&
        allSetupYears.some(fyIter => fyIter < targetFinancialYear && fyIter === r.financialYear) // Ensure payment is for a prior year's setup
    );

    paymentsForPriorYears.forEach(payment => {
        totalPaymentsMadeTowardsPriorYears += payment.totalAmount;
    });

    return Math.max(0, totalFeesDueFromPriorYears - totalPaymentsMadeTowardsPriorYears);
}

let selectedDistributionTerm = 'FY'; // Default to Full Year
const LAST_SELECTED_TERM_KEY = 'lastSelectedReceiptTerm'; // Key for localStorage

// --- NEW Helper Function to calculate payable for a specific term ---
/**
 * Calculates the total payable amount for a student up to a specific term (or full year).
 * This uses the student's fee setup for the active financial year.
 * @param {Object} studentSetup - The student's fee setup object for the current financial year.
 * @param {string} term - The term to calculate for ('T1', 'T2', 'T3', 'FY').
 * @returns {number} The total payable amount for that term.
 */
function calculateTermPayableAmount(studentSetup, term) {
    if (!studentSetup) return 0;

    let payable = 0;

    // Arrears and Admission Fee are typically one-time charges, often due with T1 or at start of FY
    payable += (studentSetup.arrears || 0);
    payable += (studentSetup.admissionFee || 0);
    payable += (studentSetup.examFee || 0); // Assuming exam fee is typically annual or with T1

    if (term === 'T1' || term === 'T2' || term === 'T3' || term === 'FY') {
        payable += (studentSetup.tf1 || 0);
        payable += (studentSetup.vf1 || 0);
    }
    if (term === 'T2' || term === 'T3' || term === 'FY') {
        payable += (studentSetup.tf2 || 0);
        payable += (studentSetup.vf2 || 0);
    }
    if (term === 'T3' || term === 'FY') {
        payable += (studentSetup.tf3 || 0);
        payable += (studentSetup.vf3 || 0);
    }
    
    // Concession is a reduction in the total payable, not a payment
    // It should be applied to the overall total, not just a term.
    // If it's specific to a term, logic needs to be more complex.
    // For simplicity here, it applies to the full year's total.
    payable -= (studentSetup.concession || 0);

    return payable;
}

        }

        /**
         * Approves a pending payment, generates a receipt, and updates the status.
         */
        window.handleApprovePayment = async (transactionId) => {
            const payment = pendingPayments.find(p => p.transactionId === transactionId);
            if (!payment) { showAlert('Payment not found.', 'danger'); return; }

            if (!confirm(`Approve payment of ₹${payment.amount} from ${payment.studentName} and generate a receipt?`)) {
                return;
            }
            
            showGlobalLoading('Approving and generating receipt...');

            try {
                const fy = payment.financialYear;
                
                // 1. Generate new receipt number
                const fyReceipts = receipts.filter(r => r.financialYear === fy);
                let maxReceiptNum = 0;
                fyReceipts.forEach(r => {
                    const numPart = parseInt(r.receiptNo.split('-')[1], 10);
                    if (!isNaN(numPart) && numPart > maxReceiptNum) {
                        maxReceiptNum = numPart;
                    }
                });
                const nextReceiptNum = `R${fy.slice(2,4)}${fy.slice(7,9)}-${(maxReceiptNum + 1).toString().padStart(4, '0')}`;

                // 2. Construct receipt data
                const receiptData = {
                    id: nextReceiptNum,
                    receiptNo: nextReceiptNum,
                    date: new Date().toISOString().slice(0, 10), // Date of approval
                    financialYear: fy,
                    isStudent: true,
                    payerName: payment.studentName,
                    studentId: payment.studentId,
                    otherDetails: `Online Payment | Txn ID: ${payment.transactionId}`,
                    items: payment.details?.items || [{ head: 'MISC', amount: payment.amount }], // Fallback to MISC if details are missing
                    totalAmount: payment.amount,
                    paymentMode: 'BANK',
                    isCancelled: false,
                    auditedBy: selectedUser.name || userId,
                    timestamp: serverTimestamp()
                };

                // 3. Create a batch write
                const batch = writeBatch(db);
                const receiptRef = getFeeDocRef(fy, 'receipts', nextReceiptNum);
                const pendingPaymentRef = getFeeDocRef(fy, 'pendingPayments', transactionId);

                batch.set(receiptRef, receiptData);
                batch.update(pendingPaymentRef, {
                    status: 'approved',
                    approvedBy: selectedUser.name || userId,
                    approvalTimestamp: serverTimestamp(),
                    receiptNo: nextReceiptNum
                });

                // 4. Commit batch
                await batch.commit();

                showAlert('Payment approved and receipt generated successfully!', 'success');
                
                // 5. Offer to print
                await printSingleReceipt(receiptData);

            } catch (error) {
                console.error("Error approving payment:", error);
                showAlert('Failed to approve payment.', 'danger');
            } finally {
                hideGlobalLoading();
            }
        };

        /**
         * Rejects a pending payment and updates its status.
         */
        window.handleRejectPayment = async (transactionId) => {
            const payment = pendingPayments.find(p => p.transactionId === transactionId);
            if (!payment) { showAlert('Payment not found.', 'danger'); return; }
            
            const reason = prompt("Enter a reason for rejection (optional):");

            if (confirm(`Are you sure you want to reject this payment of ₹${payment.amount} from ${payment.studentName}?`)) {
                try {
                    const paymentRef = getFeeDocRef(payment.financialYear, 'pendingPayments', transactionId);
                    await updateDoc(paymentRef, {
                        status: 'rejected',
                        rejectedBy: selectedUser.name || userId,
                        rejectionReason: reason || 'No reason provided.',
                        rejectionTimestamp: serverTimestamp()
                    });
                    showAlert('Payment rejected successfully.', 'success');
                } catch (error) {
                    console.error("Error rejecting payment:", error);
                    showAlert('Failed to reject payment.', 'danger');
                }
            }
        };


        // --- Initialize the module when the DOM is ready ---
        document.addEventListener('DOMContentLoaded', () => {
            console.log("DOMContentLoaded fired. Initializing app and auth.");
            initializeAppAndAuth();
        });

/**
 * Safely updates 1000+ receipts by splitting them into batches of 500.
 */
window.bulkUpdateLargeReceiptCollection = async () => {
    const targetFY = "2025-2026";
    const newDate = "2026-03-01";
    const BATCH_SIZE = 500; // Firestore limit per commit
    
    if (!confirm(`CAUTION: You are about to update ALL receipts (${receipts.length} total) in FY ${targetFY} to ${newDate}. Proceed?`)) {
        return;
    }

    showGlobalLoading(`Initializing bulk update...`);

    try {
        const receiptCollectionRef = getFeeCollectionRef(targetFY, 'receipts');
        const querySnapshot = await getDocs(receiptCollectionRef);
        const allDocs = querySnapshot.docs;
        const totalDocs = allDocs.length;

        if (totalDocs === 0) {
            showAlert("No receipts found to update.", "info");
            return;
        }

        let processedCount = 0;

        // Loop through documents in chunks of 500
        for (let i = 0; i < totalDocs; i += BATCH_SIZE) {
            const batch = writeBatch(db);
            const chunk = allDocs.slice(i, i + BATCH_SIZE);

            chunk.forEach((docSnap) => {
                batch.update(docSnap.ref, {
                    date: newDate,
                    lastModifiedBy: selectedUser.name || 'Admin Bulk Fix',
                    lastModifiedTimestamp: serverTimestamp()
                });
                processedCount++;
            });

            // Update UI with progress
            showGlobalLoading(`Updated ${processedCount} / ${totalDocs} receipts...`);
            
            // Commit this specific batch
            await batch.commit();
            console.log(`Batch ${Math.floor(i/BATCH_SIZE) + 1} committed.`);
        }

        showAlert(`Successfully updated ${processedCount} receipts to ${newDate}.`, "success");
        
        // Refresh local data/UI
        if (typeof renderRecentReceipts === 'function') {
            renderRecentReceipts();
        }

    } catch (error) {
        console.error("Multi-Batch Update Error:", error);
        showAlert("Failed during bulk update. Check console for partial success log.", "danger");
    } finally {
        hideGlobalLoading();
    }
};
