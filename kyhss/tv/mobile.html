<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Broadcaster</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #1e293b; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 16px; max-width: 100%; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; box-sizing: border-box; }
        .pin-input { font-size: 28px; text-align: center; letter-spacing: 8px; font-weight: bold; border: 2px solid #3b82f6; color: #2563eb; border-radius: 8px; padding: 10px; width: 90%; margin-bottom: 20px; }
        .btn { background: #10b981; color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        .status { margin-top: 15px; font-weight: 600; color: #64748b; }
        #preview { width: 100%; max-height: 200px; background: #000; border-radius: 8px; margin-top: 15px; display: none; object-fit: cover; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div class="card">
    <h2>📱 Mobile Camera Streamer</h2>
    <p style="color: #64748b; font-size: 14px; margin-top:-5px;">Stream your phone camera view live to the TV monitor</p>
    
    <input type="number" id="tvPin" class="pin-input" placeholder="0000">
    <button class="btn" onclick="startMobileBroadcast()">🎥 Start Wireless Broadcast</button>
    
    <video id="preview" autoplay playsinline muted></video>
    <div id="statusLabel" class="status">Disconnected</div>
</div>

<script>
    const peer = new Peer();

    async function startMobileBroadcast() {
        const inputPin = document.getElementById('tvPin').value.trim();
        const statusLabel = document.getElementById('statusLabel');

        if (inputPin.length !== 4) {
            statusLabel.innerText = "❌ Please enter the 4-digit PIN showing on your TV.";
            statusLabel.style.color = "#dc2626";
            return;
        }

        statusLabel.innerText = "Requesting mobile camera access...";
        
        try {
            // Requests the phone's back camera lens
            const cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }, 
                audio: false
            });

            // Show local preview on mobile screen
            const previewVideo = document.getElementById('preview');
            previewVideo.srcObject = cameraStream;
            previewVideo.style.display = "block";

            statusLabel.innerText = "Connecting to TV Node...";
            const call = peer.call('tv-mgt-system-' + inputPin, cameraStream);

            statusLabel.innerText = "🟢 Live! Streaming view to TV.";
            statusLabel.style.color = "#16a34a";

        } catch (err) {
            console.error(err);
            statusLabel.innerText = "❌ Camera permission denied or connection error.";
            statusLabel.style.color = "#dc2626";
        }
    }
</script>
</body>
</html>
