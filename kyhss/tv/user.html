<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Management - Controller</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f5f7; margin: 0; padding: 20px; }
        .card { background: white; padding: 24px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; }
        .btn { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 10px; }
        .btn:hover { background: #1d4ed8; }
        .btn-screen { background: #10b981; }
        .btn-screen:hover { background: #059669; }
        .btn-stop { background: #64748b; }
        .status { text-align: center; color: #64748b; font-size: 14px; margin-top: 15px; }
        #localPreview { width: 100%; border-radius: 6px; margin-top: 10px; display: none; background: #000; }
    </style>
</head>
<body>

<div class="card">
    <h2>📺 TV Controller & Streamer</h2>
    
    <div class="form-group">
        <label>Screen Sharing Controls</label>
        <button class="btn btn-screen" id="startBtn" onclick="startScreenShare()">🖥️ Start Sharing Screen</button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopScreenShare()" style="display:none;">🛑 Stop Sharing</button>
    </div>

    <video id="localPreview" autoplay playsinline muted></video>
    <div class="status" id="statusMsg">Ready to stream screen...</div>
</div>

<script>
    let localStream = null;

    async function startScreenShare() {
        try {
            // Request permission to capture screen
            localStream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: "always" },
                audio: false
            });

            // Preview locally on controller
            const preview = document.getElementById('localPreview');
            preview.srcObject = localStream;
            preview.style.display = 'block';

            // UI adjustments
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('statusMsg').innerText = "Streaming screen to TV display...";
            document.getElementById('statusMsg').style.color = '#10b981';

            // Set up communication logic for the TV to intercept
            // Creating an ObjectURL framework for local same-browser execution
            const streamId = URL.createObjectURL(localStream);
            localStorage.setItem('tv_stream_signal', JSON.stringify({
                action: 'start',
                timestamp: Date.now()
            }));

            // Handle user clicking "Stop Sharing" browser banner
            localStream.getVideoTracks()[0].onended = () => {
                stopScreenShare();
            };

            // Keep reference working across local session window variables
            window.sharedStream = localStream;

        } catch (err) {
            console.error("Error sharing screen: ", err);
            document.getElementById('statusMsg').innerText = "Permission denied or error starting stream.";
            document.getElementById('statusMsg').style.color = '#dc2626';
        }
    }

    function stopScreenShare() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        document.getElementById('localPreview').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        
        document.getElementById('statusMsg').innerText = "Stream stopped.";
        document.getElementById('statusMsg').style.color = '#64748b';

        localStorage.setItem('tv_stream_signal', JSON.stringify({
            action: 'stop',
            timestamp: Date.now()
        }));
    }
</script>
</body>
</html>
