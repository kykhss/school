<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Tab Sync Receiver</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; font-family: system-ui, sans-serif; color: white; }
        .setup-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; }
        .pin-box { font-size: 75px; font-weight: 900; background: #1e293b; padding: 15px 50px; border-radius: 16px; border: 4px solid #a855f7; color: #a855f7; letter-spacing: 8px; margin: 20px 0; box-shadow: 0 0 40px rgba(168, 85, 247, 0.3); }
        #displayFrame { width: 100%; height: 100%; border: none; display: none; background: white; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="setupScreen" class="setup-screen">
    <div style="font-size: 32px; color: #94a3b8; font-weight: bold;">📺 TV Mobile Tab Sync</div>
    <div style="font-size: 18px; color: #64748b; margin-top: 10px;">Ready to clone your mobile browser tab. Your TV Code is:</div>
    <div class="pin-box" id="tvPin">----</div>
    <div style="font-size: 14px; color: #475569;" id="status">Connecting to local network...</div>
</div>

<iframe id="displayFrame" src=""></iframe>

<script>
    // Generate a fixed random room pin for the TV node
    const secretPin = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('tvPin').innerText = secretPin;

    const peer = new Peer('tv-tab-sync-' + secretPin);

    peer.on('open', () => {
        document.getElementById('status').innerText = "🟢 Active. Ready to instantly mirror your phone's active tab!";
    });

    // Listen for the phone to send over the active web link
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if (data.syncUrl) {
                const iframe = document.getElementById('displayFrame');
                iframe.src = data.syncUrl;
                iframe.style.display = 'block';
                document.getElementById('setupScreen').style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
