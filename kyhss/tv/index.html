<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Synchronized Canvas</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020617; font-family: system-ui, sans-serif; color: white; }
        
        /* Setup Screen Container */
        .setup-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; }
        .pin-box { font-size: 80px; font-weight: 900; background: #1e293b; padding: 20px 60px; border-radius: 16px; border: 4px solid #3b82f6; color: #3b82f6; letter-spacing: 10px; margin: 20px 0; }
        
        /* TARGET VIEWPORT: Replicates the phone's sharedArea exactly */
        #sharedArea { width: 100%; height: 100%; display: none; box-sizing: border-box; padding: 20px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="setupScreen" class="setup-screen">
    <div style="font-size: 32px; color: #94a3b8; font-weight: bold;">📺 Div Sync Target Active</div>
    <div style="font-size: 18px; color: #64748b; margin-top: 10px;">Enter this PIN into your mobile phone:</div>
    <div class="pin-box" id="tvPin">----</div>
    <div style="font-size: 16px; color: #475569;" id="status">Connecting to local channel...</div>
</div>

<div id="sharedArea"></div>

<script>
    const secretPin = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('tvPin').innerText = secretPin;

    const peer = new Peer('tv-div-sync-' + secretPin);

    peer.on('open', () => {
        document.getElementById('status').innerText = "🟢 Ready. Waiting for mobile handshake...";
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if (data.htmlContent !== undefined) {
                // Clear the setup screen layout on initial payload match
                document.getElementById('setupScreen').style.display = 'none';
                
                const tvTarget = document.getElementById('sharedArea');
                tvTarget.style.display = 'block';
                
                // Synchronize the complete inner structural contents instantly
                tvTarget.innerHTML = data.htmlContent;
            }
        });
    });
</script>
</body>
</html>
