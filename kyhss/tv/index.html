<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Synchronized Display</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020617; font-family: system-ui, sans-serif; color: white; overflow: hidden; }
        
        .setup-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; }
        .pin-box { font-size: 80px; font-weight: 900; background: #1e293b; padding: 20px 60px; border-radius: 16px; border: 4px solid #10b981; color: #10b981; letter-spacing: 10px; margin: 20px 0; box-shadow: 0 0 40px rgba(16, 185, 129, 0.3); }
        
        /* The mirrored display output canvas zone */
        #sharedArea { width: 100%; height: 100%; display: none; box-sizing: border-box; padding: 0; margin: 0; background: #000; }
        
        /* Styling rules for inside the sync target so files fit beautifully */
        #sharedArea img, #sharedArea video, #sharedArea iframe { width: 100%; height: 100%; object-fit: contain; border: none; background: #000; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="setupScreen" class="setup-screen">
    <div style="font-size: 32px; color: #94a3b8; font-weight: bold;">📺 System Target Node Ready</div>
    <div style="font-size: 18px; color: #64748b; margin-top: 10px;">Connect phone to Hotspot/Wi-Fi and enter this PIN:</div>
    <div class="pin-box" id="tvPin">----</div>
    <div style="font-size: 16px; color: #475569;" id="status">Initializing network antenna...</div>
</div>

<div id="sharedArea"></div>

<script>
    const secretPin = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('tvPin').innerText = secretPin;

    const peer = new Peer('tv-div-sync-' + secretPin);

    peer.on('open', () => {
        document.getElementById('status').innerText = "📡 Online. Awaiting file initialization handshake...";
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if (data.htmlContent !== undefined) {
                document.getElementById('setupScreen').style.display = 'none';
                
                const tvCanvas = document.getElementById('sharedArea');
                tvCanvas.style.display = 'block';
                
                // Mount the incoming phone element tree into the TV monitor DOM
                tvCanvas.innerHTML = data.htmlContent;
            }
        });
    });
</script>
</body>
</html>
