<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MirrorCast — TV Display</title>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#020617; font-family:'SF Pro Display',-apple-system,system-ui,sans-serif; color:#f8fafc;
  }

  #setupScreen {
    position:fixed; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:24px;
    background:radial-gradient(ellipse at 50% 30%, #0f2a4a 0%, #020617 70%); z-index:100; transition:opacity .6s ease;
  }
  #setupScreen.hidden { opacity:0; pointer-events:none; }
  .brand-mark { display:flex; align-items:center; gap:12px; font-size:14px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#38bdf8; }
  .brand-dot  { width:10px; height:10px; border-radius:50%; background:#10b981; box-shadow:0 0 12px #10b981; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  .headline { font-size:clamp(28px,5vw,56px); font-weight:800; text-align:center; }
  .headline span { color:#38bdf8; }
  .pin-wrapper { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .pin-display { font-size:clamp(56px,11vw,104px); font-weight:900; letter-spacing:.15em; color:#10b981; text-shadow:0 0 50px rgba(16,185,129,.45); }

  #statusBar {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:8px; background:rgba(30,41,59,.9); backdrop-filter:blur(12px);
    border:1px solid #1e3a5f; border-radius:100px; padding:8px 18px; font-size:13px; color:#64748b; z-index:200;
  }
  .status-dot { width:8px; height:8px; border-radius:50%; background:#f59e0b; }
  .status-dot.live { background:#10b981; box-shadow:0 0 8px #10b981; animation:pulse 1.5s infinite; }

  #tvCanvas {
    position:fixed; top:0; left:0; width:100vw; height:100vh;
    display:none; background:#000; will-change:contents;
    transform:translateZ(0); backface-visibility:hidden;
  }
  #tvVideo {
    position:fixed; inset:0; width:100%!important; height:100%!important;
    object-fit:contain!important; display:none; background:#000;
    transform:translateZ(0); backface-visibility:hidden;
  }

  #hud { position:fixed; top:16px; right:20px; display:none; flex-direction:column; align-items:flex-end; gap:6px; z-index:300; }
  .hud-chip { background:rgba(2,6,23,.75); backdrop-filter:blur(8px); border:1px solid #1e3a5f; border-radius:8px; padding:4px 10px; font-size:11px; color:#38bdf8; font-weight:600; }
  .status-toast { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:10px 16px; border-radius:999px; z-index:999; font-size:13px; font-weight:600; }
</style>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<button id="disconnectBtn" style="position:fixed;top:18px;left:18px;z-index:999;padding:10px 16px;border:none;border-radius:12px;background:#ef4444;color:white;font-weight:700;display:none">
Disconnect TV
</button>

<div id="setupScreen">
  <div class="brand-mark"><div class="brand-dot"></div>MirrorCast Display</div>
  <div class="headline">Ready to<br><span>receive your screen</span></div>
  <div class="pin-wrapper">
    <div class="pin-display" id="tvPin">----</div>
  </div>
</div>

<div id="statusBar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Waiting for connection…</span>
</div>

<div id="hud">
  <div class="hud-chip" id="hudType">—</div>
  <div class="hud-chip" id="hudInfo">—</div>
</div>

<div class="status-toast">Ready • Awaiting Remote Media</div>

<canvas id="tvCanvas"></canvas>
<video id="tvVideo" playsinline></video>

<script>
(function(){
  const pin = Math.floor(1000 + Math.random() * 9000).toString();
  document.getElementById('tvPin').textContent = pin;

  const peer     = new Peer('tv-canvas-mirror-' + pin, { debug: 0 });
  const canvas   = document.getElementById('tvCanvas');
  const ctx      = canvas.getContext('2d', { alpha: false });
  const tvVideo  = document.getElementById('tvVideo');
  const setupScr = document.getElementById('setupScreen');
  const statusDt = document.getElementById('statusDot');
  const statusTx = document.getElementById('statusText');
  const hud      = document.getElementById('hud');
  const hudType  = document.getElementById('hudType');
  const hudInfo  = document.getElementById('hudInfo');

  const frameImg = new Image();
  let globalPdfFitMode = 'contain';
  let pdfScrollOffsetY = 0;
  
  let isAutoScrolling = false;
  let scrollSpeedStep = 1.0;
  let scrollIntervalTimer = null;

  function goLive(type) {
    setupScr.classList.add('hidden');
    statusDt.classList.add('live');
    statusTx.textContent = 'Live · ' + type;
    hud.style.display = 'flex';
  }

  peer.on('connection', conn => {
    conn.on('close', () => {
      setupScr.classList.remove('hidden');
      statusDt.classList.remove('live');
      hud.style.display = 'none';
      stopTvAutoScrollLoop();
    });

    conn.on('data', data => {
      if (data.type === 'pdf_fit_mode') {
        globalPdfFitMode = data.mode;
        pdfScrollOffsetY = 0;
        if (frameImg.src) frameImg.onload();
        return;
      }

      if (data.type === 'pdf_page_changed') {
        pdfScrollOffsetY = 0; // Fixes page change snapping back to top
        if (frameImg.src) frameImg.onload();
        return;
      }

      if (data.type === 'pdf_scroll') {
        pdfScrollOffsetY += data.offset;
        if (frameImg.src) frameImg.onload();
        return;
      }

      if (data.type === 'pdf_autoscroll_toggle') {
        isAutoScrolling = data.active;
        scrollSpeedStep = parseFloat(data.speed); // Floating-point support (0.5, etc.)
        if (isAutoScrolling) {
          startTvAutoScrollLoop(conn);
        } else {
          stopTvAutoScrollLoop();
        }
        return;
      }

      if (data.type === 'video_cmd') {
        if (data.action === 'play'){
          // CRITICAL REPLAY TV SIDE FIX: If track is done, rewind locally before unmuting
          if (tvVideo.ended || tvVideo.currentTime >= tvVideo.duration - 0.2) {
            tvVideo.currentTime = 0;
          }
          tvVideo.muted = false;
          tvVideo.play().catch(()=>{});
        }
        if (data.action === 'pause')  tvVideo.pause();
        if (data.action === 'mute')   tvVideo.muted = true;
        if (data.action === 'unmute') tvVideo.muted = false;
        if (data.action === 'volume') tvVideo.volume = Math.min(1, Math.max(0, parseFloat(data.value)));
        if (data.action === 'seek' && tvVideo.duration)
          tvVideo.currentTime = (parseFloat(data.value) / 100) * tvVideo.duration;
        return;
      }

      if (data.type === 'meta') {
        if (data.mediaType) hudType.textContent = data.mediaType;
        if (data.queueInfo) hudInfo.textContent = data.queueInfo;
        goLive(data.mediaType || '');
        return;
      }

      if (data.type === 'frame_update') {
        if (tvVideo.style.display !== 'none') {
          tvVideo.style.display = 'none';
          canvas.style.display  = 'block';
          tvVideo.pause();
        }

        if (data.mediaType) hudType.textContent = data.mediaType;
        if (data.queueInfo) hudInfo.textContent = data.queueInfo;

        frameImg.onload = () => {
          const displayW = window.innerWidth;
          const displayH = window.innerHeight;

          if (canvas.width !== displayW || canvas.height !== displayH) {
            canvas.width = displayW; canvas.height = displayH;
          }

          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, displayW, displayH);

          const imgW = frameImg.naturalWidth;
          const imgH = frameImg.naturalHeight;

          if (data.mediaType === 'PDF') {
            if (globalPdfFitMode === 'contain') {
              const scale = Math.min(displayW / imgW, displayH / imgH);
              const targetW = imgW * scale; const targetH = imgH * scale;
              ctx.drawImage(frameImg, (displayW - targetW) / 2, (displayH - targetH) / 2, targetW, targetH);
            } else {
              const scale = displayW / imgW;
              const targetW = displayW;
              const targetH = imgH * scale;
              
              const maxScroll = Math.max(0, targetH - displayH);
              if (pdfScrollOffsetY < 0) pdfScrollOffsetY = 0;
              
              // 2px Safety Buffer boundary checks to bypass sub-pixel stalling
              if (pdfScrollOffsetY >= (maxScroll - 2) && maxScroll > 0) {
                pdfScrollOffsetY = maxScroll;
                if (isAutoScrolling) {
                  stopTvAutoScrollLoop();
                  pdfScrollOffsetY = 0; // Pre-align tracking index back to top floor
                  conn.send({ type: 'tv_triggered_next_page' });
                }
              }

              ctx.drawImage(frameImg, 0, -pdfScrollOffsetY, targetW, targetH);
            }
          } else {
            const scale = Math.min(displayW / imgW, displayH / imgH);
            const targetW = imgW * scale; const targetH = imgH * scale;
            ctx.drawImage(frameImg, (displayW - targetW) / 2, (displayH - targetH) / 2, targetW, targetH);
          }
        };
        frameImg.src = data.base64Frame;
        goLive(data.mediaType || 'LIVE');
      }
    });
  });

  function startTvAutoScrollLoop(conn) {
    stopTvAutoScrollLoop();
    scrollIntervalTimer = setInterval(() => {
      if (!isAutoScrolling) return;
      pdfScrollOffsetY += scrollSpeedStep;
      if (frameImg.src) frameImg.onload();
    }, 30);
  }

  function stopTvAutoScrollLoop() {
    if (scrollIntervalTimer) {
      clearInterval(scrollIntervalTimer);
      scrollIntervalTimer = null;
    }
  }

  peer.on('call', call => {
    canvas.style.display  = 'none';
    tvVideo.style.display = 'block';
    hudType.textContent   = 'VIDEO';
    call.answer();

    call.on('stream', remoteStream => {
      tvVideo.srcObject = remoteStream;
      tvVideo.muted = true; 
      tvVideo.volume = 0.8;
      tvVideo.play().then(() => {}).catch(() => {});
      goLive('VIDEO');
    });
  });

  peer.on('error', e => { console.error(e); });
  window.addEventListener('load', () => {
    document.getElementById('disconnectBtn').onclick = () => { location.reload(); };
    setTimeout(() => { document.getElementById('disconnectBtn').style.display = 'block'; }, 1000);
  });
})();
</script>
</body>
</html>
