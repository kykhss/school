<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Stream Receiver</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020617; font-family: system-ui, sans-serif; color: white; }
        .waiting-layer { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; text-align: center; }
        .pin-box { font-size: 80px; font-weight: 900; background: #1e293b; padding: 20px 60px; border-radius: 16px; border: 4px solid #3b82f6; color: #3b82f6; letter-spacing: 10px; margin: 20px 0; }
        #tvFeed { width: 100%; height: 100%; object-fit: contain; position: absolute; top:0; left:0; z-index: 2; display: none; background: #000; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="waitingScreen" class="waiting-layer">
    <div style="font-size: 32px; color: #94a3b8; font-weight: bold;">📺 TV Mobile Receiver Ready</div>
    <div style="font-size: 18px; color: #64748b; margin-top: 10px;">Enter this PIN into your mobile browser:</div>
    <div class="pin-box" id="generatedPin">----</div>
    <div style="font-size: 16px; color: #475569;" id="statusMsg">Connecting to local network...</div>
</div>

<video id="tvFeed" autoplay playsinline></video>

<script>
    const secretPin = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('generatedPin').innerText = secretPin;

    const peer = new Peer('tv-mgt-system-' + secretPin);

    peer.on('open', () => {
        document.getElementById('statusMsg').innerText = "🟢 Ready. Awaiting mobile broadcast...";
    });

    peer.on('call', (call) => {
        call.answer();
        call.on('stream', (remoteStream) => {
            const video = document.getElementById('tvFeed');
            video.srcObject = remoteStream;
            video.style.display = 'block';
            document.getElementById('waitingScreen').style.display = 'none';
        });
    });
</script>
</body>
</html>
