<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MirrorCast Canvas Core — TV Display</title>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000000; font-family:-apple-system,system-ui,sans-serif; color:#f8fafc; }
  
  #tvCanvas {
    position:fixed; inset:0; width:100vw; height:100vh; display:block;
    will-change:transform; transform-origin: top center;
  }

  #setupScreen { position:fixed; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px; background:radial-gradient(ellipse at 50% 30%, #0f2a4a 0%, #020617 70%); z-index:100; }
  #setupScreen.hidden { display:none; }
  .headline { font-size:32px; font-weight:800; color:#38bdf8; text-transform:uppercase; text-align:center; }
  .code-badge-panel { font-size:64px; font-weight:900; color:#10b981; background:rgba(16,185,129,0.1); padding:10px 40px; border-radius:16px; border:2px dashed rgba(16,185,129,0.3); text-shadow:0 0 30px rgba(16,185,129,0.4); font-variant-numeric: tabular-nums; margin-top:10px; letter-spacing:4px; }
  .status-toast { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:#0f172a; border:1px solid #1e3a5f; color:#38bdf8; padding:10px 20px; border-radius:999px; z-index:999; font-size:14px; font-weight:700; }
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<div id="setupScreen">
  <div class="headline">MirrorCast Pure Canvas Active</div>
  <div style="color:#64748b; font-weight:600;">Select this Code on your controller dashboard app:</div>
  <div class="code-badge-panel" id="tvPinDisplay">----</div>
</div>

<div class="status-toast" id="toastNotification">Initializing Canvas Layout Core Engines...</div>

<canvas id="tvCanvas"></canvas>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

const firebaseConfig = {
  apiKey: "AIzaSyAu5TDMWepJX7naoG5H3WpGJ1yxAu01whg",
  authDomain: "timetables-470dd.firebaseapp.com",
  projectId: "timetables-470dd",
  storageBucket: "timetables-470dd.firebasestorage.app",
  messagingSenderId: "925422681424",
  appId: "1:925422681424:web:df91ce9de4dfef9c5ec055",
  measurementId: "G-N7ND4LPL9W"
};

// ⚠️ MUST PASTE THE EXACT SAME APPS SCRIPT WEBAPP URL HERE TO BYPASS CORS ON DRIVE
const APPS_SCRIPT_PROXY_URL = "https://script.google.com/macros/s/AKfycbymm-tJsqG69GLs_QIGF96B-FIcMDJHXBrogbA8tRxF0wr8qEsV_Z8T1gPqx9g9QiXf2g/exec";

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const canvas = document.getElementById('tvCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

let screenUniqueKey = localStorage.getItem('mirror_cast_tv_pin');
if (!screenUniqueKey || screenUniqueKey.length !== 4 || isNaN(screenUniqueKey)) {
  screenUniqueKey = Math.floor(1000 + Math.random() * 9000).toString();
  localStorage.setItem('mirror_cast_tv_pin', screenUniqueKey);
}

document.getElementById('tvPinDisplay').textContent = screenUniqueKey;
document.getElementById('toastNotification').textContent = `Screen Key ID: [${screenUniqueKey}] Connected`;

// Layout Parameters
let activeSourceTrack = null; 
let activeMediaType = "";     
let canvasRenderCache = null;  
let zoomFactor = 1.0;
let scrollOffsetY = 0;
let autoScrollActive = false;
let scrollSpeed = 1.0;
let drawLoopId = null;

// Register screen into target cluster index row
db.collection("tv").doc("smrtv").collection("registeredtv").doc(screenUniqueKey).set({
  status: "online",
  last_active: firebase.firestore.FieldValue.serverTimestamp()
});

// Realtime snapshot control handler
db.collection("tv").doc("smrtv").collection("active_states").doc(screenUniqueKey).onSnapshot(doc => {
  if (!doc.exists || !doc.data().drive_id) return;
  const data = doc.data();
  
  zoomFactor = data.zoom || 1.0;
  autoScrollActive = data.auto_scroll || false;
  scrollSpeed = data.scroll_speed || 1.0;

  if (data.type === 'reset_media') {
    zoomFactor = 1.0; scrollOffsetY = 0; autoScrollActive = false;
    return;
  }

  document.getElementById('setupScreen').classList.add('hidden');
  fetchSafeDrivePayload(data.drive_id, data.mime_type);
});

// Requests the Apps Script proxy to fetch and convert the file into a base64 string
function fetchSafeDrivePayload(fileId, mimeType) {
  document.getElementById('toastNotification').textContent = "Bypassing Cross-Origin Polices via Script Proxy...";
  
  fetch(APPS_SCRIPT_PROXY_URL, {
    method: "POST",
    body: JSON.stringify({ action: "fetch_drive_blob", fileId: fileId })
  })
  .then(res => res.json())
  .then(response => {
    if (!response.success) throw new Error(response.error);
    
    // Construct local data URI string out of clean base64 data stream byte arrays
    const base64Uri = `data:${mimeType};base64,${response.base64Data}`;
    processBytesToCanvasContext(mimeType, base64Uri);
  })
  .catch(err => {
    document.getElementById('toastNotification').textContent = "Proxy stream connection block.";
    console.error(err);
  });
}

function processBytesToCanvasContext(mimeType, dataUri) {
  // Reset structural tracking parameters cleanly
  if (drawLoopId) cancelAnimationFrame(drawLoopId);
  if (activeMediaType === "video" && activeSourceTrack) {
    activeSourceTrack.pause(); activeSourceTrack.removeAttribute('src'); activeSourceTrack.load();
  }
  
  canvasRenderCache = null;

  if (mimeType.startsWith('image/')) {
    activeMediaType = "image";
    document.getElementById('toastNotification').textContent = "Painting image layers...";
    activeSourceTrack = new Image();
    activeSourceTrack.src = dataUri;
    activeSourceTrack.onload = () => { triggerCanvasRenderPipeline(); };
  } 
  else if (mimeType === 'application/pdf') {
    activeMediaType = "pdf";
    document.getElementById('toastNotification').textContent = "Unpacking PDF vector sheets...";
    
    pdfjsLib.getDocument(dataUri).promise.then(pdf => {
      return pdf.getPage(1);
    }).then(page => {
      const viewport = page.getViewport({ scale: 2.5 });
      const internalBufferCanvas = document.createElement('canvas');
      internalBufferCanvas.width = viewport.width;
      internalBufferCanvas.height = viewport.height;
      
      page.render({ canvasContext: internalBufferCanvas.getContext('2d'), viewport: viewport }).promise.then(() => {
        canvasRenderCache = internalBufferCanvas;
        triggerCanvasRenderPipeline();
      });
    });
  } 
  else if (mimeType.startsWith('video/')) {
    activeMediaType = "video";
    document.getElementById('toastNotification').textContent = "Decoding compressed native video track...";
    
    activeSourceTrack = document.createElement('video');
    activeSourceTrack.src = dataUri;
    activeSourceTrack.playsInline = true;
    activeSourceTrack.loop = true;
    activeSourceTrack.muted = false; // Directly plays audio clearly
    
    activeSourceTrack.play().then(() => {
      triggerCanvasRenderPipeline();
    }).catch(() => {
      // Force programmatic fallback bypass if TV requires gesture confirmation
      activeSourceTrack.muted = true;
      activeSourceTrack.play().then(() => { triggerCanvasRenderPipeline(); });
    });
  }
}

function triggerCanvasRenderPipeline() {
  if (drawLoopId) cancelAnimationFrame(drawLoopId);

  function frameTick() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
    }

    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, w, h);

    let naturalW = 0, naturalH = 0;
    let sourceElement = null;

    if (activeMediaType === "image" && activeSourceTrack) {
      naturalW = activeSourceTrack.naturalWidth;
      naturalH = activeSourceTrack.naturalHeight;
      sourceElement = activeSourceTrack;
    } else if (activeMediaType === "pdf" && canvasRenderCache) {
      naturalW = canvasRenderCache.width;
      naturalH = canvasRenderCache.height;
      sourceElement = canvasRenderCache;
    } else if (activeMediaType === "video" && activeSourceTrack) {
      naturalW = activeSourceTrack.videoWidth;
      naturalH = activeSourceTrack.videoHeight;
      sourceElement = activeSourceTrack;
    }

    if (naturalW && naturalH && sourceElement) {
      const scaleRatio = Math.min(w / naturalW, h / naturalH) * zoomFactor;
      const targetWidth = naturalW * scaleRatio;
      const targetHeight = naturalH * scaleRatio;

      if (autoScrollActive) {
        scrollOffsetY += scrollSpeed;
        const totalScrollableHeight = Math.max(0, targetHeight - h);
        if (scrollOffsetY > totalScrollableHeight) scrollOffsetY = 0;
      }

      const drawX = (w - targetWidth) / 2;
      const drawY = ((h - targetHeight) / 2) - scrollOffsetY;

      ctx.drawImage(sourceElement, drawX, drawY, targetWidth, targetHeight);
    }

    drawLoopId = requestAnimationFrame(frameTick);
  }
  drawLoopId = requestAnimationFrame(frameTick);
}

window.onbeforeunload = function() {
  db.collection("tv").doc("smrtv").collection("registeredtv").doc(screenUniqueKey).set({ status: "offline" });
};
</script>
</body>
</html>
