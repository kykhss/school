<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure TV Display</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; font-family: system-ui, sans-serif; color: white; }
        .pairing-container { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; }
        .pin-box { font-size: 80px; font-weight: 900; background: #1e293b; padding: 20px 60px; border-radius: 16px; border: 4px solid #3b82f6; color: #3b82f6; letter-spacing: 10px; margin: 20px 0; box-shadow: 0 0 40px rgba(59, 130, 246, 0.4); }
        #tvContent { width: 100%; height: 100%; display: none; background: #000; position: absolute; top: 0; left: 0; }
        #displayImage { width: 100%; height: calc(100% - 70px); object-fit: cover; width: 100%; }
        .ticker-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; background: #111827; display: flex; align-items: center; overflow: hidden; font-size: 28px; font-weight: bold; color: #f59e0b; border-top: 3px solid #1e293b; }
        .ticker-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
</head>
<body>

<div id="pairingScreen" class="pairing-container">
    <div style="font-size: 32px; color: #94a3b8; font-weight: bold;">🔒 TV Access Locked</div>
    <div style="font-size: 20px; color: #64748b; margin-top: 10px;">Enter this code on your mobile phone to connect:</div>
    <div class="pin-box" id="generatedPin">0000</div>
    <div style="font-size: 16px; color: #475569;" id="cloudStatus">Connecting to cloud secure channel...</div>
</div>

<div id="tvContent">
    <img id="displayImage" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200" alt="TV Media">
    <div class="ticker-bar">
        <div class="ticker-text" id="tickerMsg">Paired successfully! Awaiting commands from mobile device...</div>
    </div>
</div>

<script>
    // 1. Generate a completely random 4-digit security PIN
    const secretPin = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('generatedPin').innerText = secretPin;

    // 2. Initialize connection to public cloud broker
    const pubnub = new PubNub({
        publishKey: 'pub-c-cb6df645-ec05-4f4f-b672-ecdb92b95c02', // Shared demo keys
        subscribeKey: 'sub-c-57697b0a-be75-11e4-b333-02ee2ddab7fe',
        userId: "tv_display_node"
    });

    // Subscribe to a unique channel based purely on this TV's unique pin code
    pubnub.subscribe({ channels: ['tv_channel_' + secretPin] });
    
    document.getElementById('cloudStatus').innerText = "🟢 Ready! Waiting for phone authentication...";

    // 3. Listen for incoming wireless transmissions from the mobile phone
    pubnub.addListener({
        message: function(event) {
            const data = event.message;
            
            // Double check code match for extreme safety
            if (data.pin === secretPin) {
                document.getElementById('pairingScreen').style.display = 'none';
                document.getElementById('tvContent').style.display = 'block';

                if (data.ticker) document.getElementById('tickerMsg').innerText = data.ticker;
                if (data.imgUrl) document.getElementById('displayImage').src = data.imgUrl;
            }
        }
    });
</script>
</body>
</html>
