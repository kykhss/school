<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure TV Display</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; font-family: system-ui, sans-serif; color: white; }
        .pairing-container { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; }
        .pin-box { font-size: 80px; font-weight: 900; background: #1e293b; padding: 20px 60px; border-radius: 16px; border: 4px solid #10b981; color: #10b981; letter-spacing: 10px; margin: 20px 0; box-shadow: 0 0 40px rgba(16, 185, 129, 0.3); }
        #tvContent { width: 100%; height: 100%; display: none; background: #000; position: absolute; top: 0; left: 0; }
        #displayImage { width: 100%; height: calc(100% - 70px); object-fit: cover; }
        .ticker-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; background: #111827; display: flex; align-items: center; overflow: hidden; font-size: 28px; font-weight: bold; color: #f59e0b; border-top: 3px solid #1e293b; }
        .ticker-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="pairingScreen" class="pairing-container">
    <div style="font-size: 32px; color: #94a3b8; font-weight: bold;">🔒 Local TV Node Ready</div>
    <div style="font-size: 20px; color: #64748b; margin-top: 10px;">Make sure phone is on the same Wi-Fi. Enter this code:</div>
    <div class="pin-box" id="generatedPin">----</div>
    <div style="font-size: 16px; color: #475569;" id="localStatus">Initializing antenna...</div>
</div>

<div id="tvContent">
    <img id="displayImage" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200" alt="TV Media">
    <div class="ticker-bar">
        <div class="ticker-text" id="tickerMsg">Paired successfully over local channel!</div>
    </div>
</div>

<script>
    // Generate a random 4-digit numeric code
    const secretPin = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById('generatedPin').innerText = secretPin;

    // Create a peer explicitly locked to this specific code 
    // This avoids congested room pools completely
    const peer = new Peer('tv-mgt-system-' + secretPin);

    peer.on('open', (id) => {
        document.getElementById('localStatus').innerText = "📡 Signal strong. Awaiting connection from phone...";
    });

    peer.on('error', (err) => {
        console.error(err);
        document.getElementById('localStatus').innerText = "⚠️ Connection busy. Please refresh the page.";
    });

    // Watch for incoming direct phone data payloads
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            if (data.authPin === secretPin) {
                document.getElementById('pairingScreen').style.display = 'none';
                document.getElementById('tvContent').style.display = 'block';

                if (data.ticker) document.getElementById('tickerMsg').innerText = data.ticker;
                if (data.imgUrl) document.getElementById('displayImage').src = data.imgUrl;
            }
        });
    });
</script>
</body>
</html>
