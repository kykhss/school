<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile File Share Remote</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #1e293b; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 16px; max-width: 100%; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; box-sizing: border-box; }
        h2 { font-size: 24px; margin-top: 0; color: #0f172a; }
        .form-group { margin-bottom: 20px; text-align: left; width: 95%; margin: 0 auto 20px auto; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; font-size: 14px; }
        .pin-input { font-size: 28px; text-align: center; letter-spacing: 8px; font-weight: bold; border: 2px solid #3b82f6; color: #2563eb; border-radius: 10px; padding: 12px; width: 100%; box-sizing: border-box; }
        .file-input { width: 100%; padding: 12px; border: 2px dashed #cbd5e1; border-radius: 10px; background: #f1f5f9; box-sizing: border-box; }
        .btn { background: #2563eb; color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .btn:active { background: #1d4ed8; }
        .status { margin-top: 15px; font-weight: 600; color: #64748b; }
        .progress-bar { width: 100%; background-color: #e2e8f0; border-radius: 8px; display: none; margin-top: 10px; }
        .progress-fill { width: 0%; height: 10px; background-color: #10b981; border-radius: 8px; transition: width 0.2s; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div class="card">
    <h2>📱 Universal TV Caster</h2>
    <p style="color: #64748b; font-size: 14px; margin-top:-5px;">Cast images, videos, PDFs, or Word Docs instantly</p>
    
    <div class="form-group">
        <label for="tvPin">Enter 4-Digit TV PIN</label>
        <input type="number" id="tvPin" class="pin-input" placeholder="0000" pattern="\d*">
    </div>

    <div class="form-group">
        <label for="filePicker">Select File to Cast</label>
        <input type="file" id="filePicker" class="file-input" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.mp4,.mov">
    </div>

    <button class="btn" onclick="processAndCastFile()">🚀 Cast Content to TV</button>
    
    <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
    <div id="statusLabel" class="status">Disconnected</div>
</div>

<script>
    const peer = new Peer();

    function processAndCastFile() {
        const inputPin = document.getElementById('tvPin').value.trim();
        const filePicker = document.getElementById('filePicker');
        const statusLabel = document.getElementById('statusLabel');
        const progBar = document.getElementById('progBar');
        const progFill = document.getElementById('progFill');

        if (inputPin.length !== 4) {
            statusLabel.innerText = "❌ Please enter the 4-digit PIN showing on your TV.";
            statusLabel.style.color = "#dc2626";
            return;
        }

        if (filePicker.files.length === 0) {
            statusLabel.innerText = "❌ Please select a file first.";
            statusLabel.style.color = "#dc2626";
            return;
        }

        const file = filePicker.files[0];
        statusLabel.innerText = "Reading file data locally...";
        statusLabel.style.color = "#2563eb";
        progBar.style.display = "block";
        progFill.style.width = "20%";

        const reader = new FileReader();

        // Convert the file to an encrypted data string URL format
        reader.readAsDataURL(file);

        reader.onload = function(e) {
            progFill.style.width = "50%";
            statusLabel.innerText = "Connecting directly to TV channel...";

            const conn = peer.connect('tv-mgt-system-' + inputPin);

            conn.on('open', () => {
                progFill.style.width = "80%";
                statusLabel.innerText = "Beaming file payload to screen...";

                // Package the file meta data and content payload together 
                conn.send({
                    fileName: file.name,
                    fileType: file.type,
                    fileData: e.target.result
                });

                progFill.style.width = "100%";
                statusLabel.innerText = `✨ ${file.name} casted successfully!`;
                statusLabel.style.color = "#16a34a";
                
                setTimeout(() => { progBar.style.display = "none"; progFill.style.width = "0%"; }, 3000);
            });

            conn.on('error', (err) => {
                statusLabel.innerText = "❌ Transfer failed. Check Wi-Fi configuration.";
                statusLabel.style.color = "#dc2626";
                progBar.style.display = "none";
            });
        };
    }
</script>
</body>
</html>
