<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile File-to-Div Controller</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f1f5f9; margin: 0; padding: 15px; color: #1e293b; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; box-sizing: border-box; margin-bottom: 15px; }
        .pin-input { font-size: 26px; text-align: center; letter-spacing: 6px; font-weight: bold; border: 2px solid #10b981; color: #059669; border-radius: 10px; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 15px; }
        .file-input { width: 100%; padding: 15px; border: 2px dashed #cbd5e1; border-radius: 10px; background: #f8fafc; box-sizing: border-box; margin-bottom: 15px; font-weight: bold; }
        .btn { background: #10b981; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3); }
        .btn:active { background: #059669; }
        
        /* THE CRITICAL SHARED AREA CONTAINER */
        #sharedArea { background: #1e293b; color: white; border-radius: 12px; padding: 10px; min-height: 200px; max-height: 350px; border: 2px dashed #10b981; margin-top: 15px; overflow-y: auto; display: flex; justify-content: center; align-items: center; box-sizing: border-box; }
        
        /* Inner responsive elements inside your target phone wrapper */
        #sharedArea img, #sharedArea video, #sharedArea iframe { max-width: 100%; max-height: 320px; object-fit: contain; border-radius: 6px; border: none; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div class="card">
    <h2 style="margin: 0 0 15px 0;">📱 Local Sync Control</h2>
    
    <input type="number" id="tvPin" class="pin-input" placeholder="0000" pattern="\d*">
    <button class="btn" onclick="connectToTV()">🔗 Link Mobile to TV</button>
    <div id="status" style="font-weight:600; color:#64748b; font-size:14px; margin-top:12px;">Status: Disconnected</div>
</div>

<div class="card">
    <h3 style="margin: 0 0 12px 0;">📂 File Content Selector</h3>
    <input type="file" id="filePicker" class="file-input" accept=".png,.jpg,.jpeg,.mp4,.pdf" onchange="loadFileIntoDiv()">
</div>

<div id="sharedArea">
    <div id="placeholderText" style="color: #94a3b8; font-size:14px; padding: 20px;">
        🔒 Link your TV code and pick a file above. The content will render inside this box and mirror onto the TV instantly!
    </div>
</div>

<script>
    const peer = new Peer();
    let activeChannelConn = null;

    function connectToTV() {
        const inputPin = document.getElementById('tvPin').value.trim();
        const status = document.getElementById('status');

        if (inputPin.length !== 4) {
            status.innerText = "Status: ❌ Invalid PIN code.";
            status.style.color = "#dc2626";
            return;
        }

        status.innerText = "Status: Pinging TV receptor port...";
        status.style.color = "#2563eb";

        activeChannelConn = peer.connect('tv-div-sync-' + inputPin);

        activeChannelConn.on('open', () => {
            status.innerText = "Status: 🟢 Connected to TV Screen!";
            status.style.color = "#16a34a";
            
            // Push current inner state immediately on connection open
            broadcastDivState();
        });
    }

    // THIS CRITICAL BLOCK READS THE CHOSEN FILE AND LOADS IT INTO THE DIV CONTAINER
    function loadFileIntoDiv() {
        const filePicker = document.getElementById('filePicker');
        const sharedArea = document.getElementById('sharedArea');

        if (filePicker.files.length === 0) return;
        const file = filePicker.files[0];

        const reader = new FileReader();
        reader.readAsDataURL(file);

        reader.onload = function(e) {
            const dataUrl = e.target.result;

            // Generate the matching HTML elements based on what kind of file was uploaded
            if (file.type.startsWith('image/')) {
                sharedArea.innerHTML = `<img src="${dataUrl}" alt="Synced Asset">`;
            } 
            else if (file.type.startsWith('video/')) {
                sharedArea.innerHTML = `<video src="${dataUrl}" controls autoplay loops muted playsinline></video>`;
            } 
            else if (file.type === 'application/pdf') {
                // Renders beautifully within browser frames
                sharedArea.innerHTML = `<iframe src="${dataUrl}"></iframe>`;
            } else {
                sharedArea.innerHTML = `<div style="padding:20px; color:#ef4444; font-weight:bold;">Unsupported File Format</div>`;
            }

            // Immediately send the newly loaded div code over to the TV
            broadcastDivState();
        };
    }

    function broadcastDivState() {
        if (!activeChannelConn) return;

        // Extract the exact active inner structural data inside your div
        const currentHTMLStructure = document.getElementById('sharedArea').innerHTML;

        // Push across the network space loop
        activeChannelConn.send({
            htmlContent: currentHTMLStructure
        });
    }
</script>
</body>
</html>
